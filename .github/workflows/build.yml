name: build

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        id: image
        run: |
          REF="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA::7}"
          LATEST="${REGISTRY}/${IMAGE_NAME}:latest"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.image.outputs.ref }}" -t "${{ steps.image.outputs.latest }}" ./app

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.ref }}"
          docker push "${{ steps.image.outputs.latest }}"

      - name: Summary
        run: echo "::notice::Pushed ${{ steps.image.outputs.ref }}"
