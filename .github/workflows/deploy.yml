name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. commit SHA short or 'latest')"
        default: "latest"
      apply_staging:
        description: "Also apply k8s/50-sdv2-staging.yaml (Rung 3)"
        type: boolean
        default: false
  workflow_run:
    workflows: [build]
    types: [completed]

permissions:
  contents: read

env:
  GKE_CLUSTER: orders-demo
  GKE_ZONE: us-central1-c
  GKE_REGION: us-central1
  AR_REPO: orders-demo
  IMAGE_NAME: orders-demo

jobs:
  deploy:
    # Only run on manual trigger, or when the 'build' workflow succeeds.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials "$GKE_CLUSTER" --zone "$GKE_ZONE"

      - name: Resolve image ref
        id: image
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          # When triggered by workflow_run, prefer the short SHA of the head commit.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${GITHUB_SHA::7}"
          fi
          REF="${GKE_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${IMAGE_NAME}:${TAG}"
          echo "ORDERS_IMAGE=$REF" >> "$GITHUB_ENV"
          echo "::notice::Deploying $REF"

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/00-namespaces.yaml
          kubectl apply -f k8s/10-postgres.yaml
          kubectl apply -f k8s/20-redpanda.yaml
          for ns in orders-sdv1 orders-sdv2; do
            kubectl -n "$ns" rollout status statefulset/postgres --timeout=180s
            kubectl -n "$ns" rollout status statefulset/redpanda --timeout=180s
          done

      - name: Apply app Deployments (with image substitution)
        run: |
          envsubst < k8s/30-app.yaml | kubectl apply -f -
          for ns in orders-sdv1 orders-sdv2; do
            kubectl -n "$ns" rollout status deployment/orders-demo --timeout=300s
          done

      - name: Apply load generator
        run: |
          for ns in orders-sdv1 orders-sdv2; do
            kubectl -n "$ns" create configmap loadtest-script \
              --from-file=loadtest.js=load/loadtest.js \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          kubectl apply -f k8s/40-load.yaml

      - name: Apply staging namespace (Rung 3)
        if: ${{ inputs.apply_staging == true }}
        run: |
          envsubst < k8s/50-sdv2-staging.yaml | kubectl apply -f -
          kubectl -n orders-sdv2-staging create configmap loadtest-script \
            --from-file=loadtest.js=load/loadtest.js \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n orders-sdv2-staging rollout status deployment/orders-demo --timeout=300s

      - name: Summary
        run: |
          echo "::notice::Deployed $ORDERS_IMAGE"
          echo "::notice::Next: opt orders-sdv2 into SDv2 in the Dynatrace UI. See dynatrace/install.md step 5."
