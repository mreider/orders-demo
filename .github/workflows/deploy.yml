name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. commit SHA short or 'latest')"
        default: "latest"
  workflow_run:
    workflows: [build]
    types: [completed]
  # Keep the cluster in sync with the repo. Any manifest / deploy-script
  # change on main triggers a re-apply. kubectl apply is idempotent for
  # creates and updates, but it does NOT delete resources whose manifest
  # was removed — if you delete a file under k8s/, also `kubectl delete`
  # the resource it created, or add --prune with a managed-by label.
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "load/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read
  packages: read

env:
  GKE_CLUSTER: orders-demo
  GKE_ZONE: us-central1-c
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    # Run on manual trigger, on a successful 'build' workflow run, or on
    # any push that touches manifests / load scripts.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials "$GKE_CLUSTER" --zone "$GKE_ZONE"

      - name: Resolve image ref
        id: image
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${GITHUB_SHA::7}"
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            # Manifest-only sync — preserve whatever image tag is already running.
            # This keeps app pod images stable when only k8s manifests change.
            # Falls back to 'latest' if the Deployment doesn't exist yet (bootstrap).
            RUNNING=$(kubectl -n orders-sdv1 get deploy orders-demo \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null | awk -F: '{print $NF}' || true)
            TAG="${RUNNING:-latest}"
          fi
          REF="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "ORDERS_IMAGE=$REF" >> "$GITHUB_ENV"
          echo "::notice::Deploying $REF"

      - name: Apply base manifests
        run: |
          kubectl apply -f k8s/00-namespaces.yaml
          kubectl apply -f k8s/10-postgres.yaml
          kubectl apply -f k8s/11-postgres-exporter.yaml
          kubectl apply -f k8s/20-kafka.yaml
          for ns in orders-sdv1 orders-sdv2; do
            kubectl -n "$ns" rollout status statefulset/postgres --timeout=180s
            kubectl -n "$ns" rollout status statefulset/kafka    --timeout=240s
            kubectl -n "$ns" rollout status deployment/postgres-exporter --timeout=120s
          done

      - name: Apply app Deployments (with image substitution)
        run: |
          : "${ORDERS_IMAGE:?ORDERS_IMAGE must be set by the 'Resolve image ref' step}"
          envsubst '${ORDERS_IMAGE}' < k8s/30-app.yaml       | kubectl apply -f -
          envsubst '${ORDERS_IMAGE}' < k8s/31-app-named.yaml | kubectl apply -f -
          for ns in orders-sdv1 orders-sdv2; do
            kubectl -n "$ns" rollout status deployment/orders-demo --timeout=300s
          done
          kubectl -n orders-sdv1 rollout status deployment/orders-demo-named --timeout=300s

      - name: Apply load generators
        run: |
          for ns in orders-sdv1 orders-sdv2; do
            kubectl -n "$ns" create configmap loadtest-script \
              --from-file=loadtest.js=load/loadtest.js \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          kubectl apply -f k8s/40-load.yaml
          kubectl apply -f k8s/41-load-named.yaml

      - name: Summary
        run: |
          echo "::notice::Deployed $ORDERS_IMAGE"
          echo "::notice::Next: opt orders-sdv2 into SDv2 in the Dynatrace UI."
