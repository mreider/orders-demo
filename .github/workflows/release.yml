name: release

# Cuts a GitHub Release on every tag push. Packages the committed slides
# and curriculum artifacts — the .pptx files under curriculum/ are the
# release source of truth. If you've edited slides, run
# `scripts/build-slides.sh` locally and commit before tagging.
#
# Artifacts:
#   curriculum-slides-<tag>.zip      — all 13 PPTX decks + their Marp source
#   curriculum-notebooks-<tag>.zip   — lab notebook YAMLs + home notebook
#   curriculum-full-<tag>.tar.gz     — markdown + YAML + slides + PPTX + SETUP.md
#
# The app image is not a release artifact. build.yml pushes it to
# ghcr.io on every main-branch push, tagged by short SHA and :latest.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package artifacts
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist

          find curriculum -type f \( -name '*.pptx' -o -name '*.slides.md' \) \
            | zip -@ "dist/curriculum-slides-${TAG}.zip"

          find curriculum -name '*.yaml' ! -name '*.slides.md' -type f \
            | zip -@ "dist/curriculum-notebooks-${TAG}.zip"
          (cd notebooks && zip -g "../dist/curriculum-notebooks-${TAG}.zip" home.yaml)

          tar --exclude='*.DS_Store' -czf "dist/curriculum-full-${TAG}.tar.gz" \
            curriculum notebooks/home.yaml SETUP.md curriculum/README.md

          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## orders-demo ${{ github.ref_name }}

            **Artifacts**

            - `curriculum-slides-${{ github.ref_name }}.zip` — 13 editable PPTX decks + Marp source.
            - `curriculum-notebooks-${{ github.ref_name }}.zip` — 11 lab YAMLs + home notebook.
            - `curriculum-full-${{ github.ref_name }}.tar.gz` — the whole teaching tree (narrative markdown + labs + slides + home notebook + setup guide).

            See [SETUP.md](SETUP.md) for how to load into your tenant.
          files: |
            dist/curriculum-slides-*.zip
            dist/curriculum-notebooks-*.zip
            dist/curriculum-full-*.tar.gz
          generate_release_notes: true
