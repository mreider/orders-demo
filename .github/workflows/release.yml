name: release

# Cuts a GitHub Release on every tag push. Packages the committed slides
# and presentation artifacts. presentation/sdv2-presentation.pptx is the
# release source of truth for slides; if you've edited any .slides.md,
# run scripts/build-slides.sh locally and commit before tagging.
#
# Artifacts:
#   sdv2-presentation-<tag>.pptx       single consolidated deck, every section
#   sdv2-demos-<tag>.zip   unified demo notebook YAML
#   sdv2-presentation-full-<tag>.tar.gz     markdown + YAML + slides source + pptx + SETUP.md
#
# The app image is not a release artifact. build.yml pushes it to
# ghcr.io on every main-branch push, tagged by short SHA and :latest.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package artifacts
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist

          # Single consolidated deck (all sections in one file)
          cp presentation/sdv2-presentation.pptx "dist/sdv2-presentation-${TAG}.pptx"

          # Lab notebook bundle
          find presentation -name '*.yaml' ! -name '*.slides.md' -type f \
            | zip -@ "dist/sdv2-demos-${TAG}.zip"

          # Full teaching tree (markdown + YAML + slides source + pptx + setup)
          tar --exclude='*.DS_Store' -czf "dist/sdv2-presentation-full-${TAG}.tar.gz" \
            presentation SETUP.md

          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## orders-demo ${{ github.ref_name }}

            **Artifacts**

            - `sdv2-presentation-${{ github.ref_name }}.pptx`: single editable deck covering every section of the SDv1 to SDv2 presentation.
            - `sdv2-demos-${{ github.ref_name }}.zip`: the unified demo notebook YAML.
            - `sdv2-presentation-full-${{ github.ref_name }}.tar.gz`: the whole presentation tree (narrative markdown + demo YAMLs + Marp source + pptx + setup guide).

            See [SETUP.md](SETUP.md) for how to load into your tenant.
          files: |
            dist/sdv2-presentation-*.pptx
            dist/sdv2-demos-*.zip
            dist/sdv2-presentation-full-*.tar.gz
          generate_release_notes: true
