# DynaKube for orders-demo.
#
# Injects OneAgent into any namespace labeled `dynatrace: "enabled"` -
# that covers both orders-sdv1 and orders-sdv2 (see k8s/00-namespaces.yaml).
#
# The SDv1-vs-SDv2 choice is NOT configured here. It is opted in per-namespace
# via the Dynatrace UI: see dynatrace/install.md, Step 5.
#
# Replace <DT_API_URL> with the full API URL of your tenant, e.g.
#   https://abc12345.live.dynatrace.com/api            (production SaaS)
#   https://abc12345.dev.dynatracelabs.com/api         (dev tenant)
#   https://abc12345.sprint.dynatracelabs.com/api      (sprint tenant)
apiVersion: dynatrace.com/v1beta6
kind: DynaKube
metadata:
  name: dynakube
  namespace: dynatrace
  annotations:
    feature.dynatrace.com/automatic-kubernetes-api-monitoring: "true"
spec:
  apiUrl: <DT_API_URL>
  tokens: dynakube
  skipCertCheck: false
  oneAgent:
    hostGroup: orders-demo
    cloudNativeFullStack:
      namespaceSelector:
        matchLabels:
          dynatrace: "enabled"
  activeGate:
    capabilities:
      - routing
      - kubernetes-monitoring
      - dynatrace-api
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
