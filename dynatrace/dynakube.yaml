# DynaKube for orders-demo.
#
# Injects OneAgent into any namespace labeled `dynatrace: "enabled"` -
# that covers both orders-sdv1 and orders-sdv2 (see k8s/00-namespaces.yaml).
#
# The SDv1-vs-SDv2 choice is NOT configured here. It is opted in per-namespace
# via the Dynatrace UI: see dynatrace/install.md, Step 5.
#
# Replace <YOUR_TENANT_ID> before applying.
apiVersion: dynatrace.com/v1beta3
kind: DynaKube
metadata:
  name: dynakube
  namespace: dynatrace
  annotations:
    feature.dynatrace.com/automatic-kubernetes-api-monitoring: "true"
spec:
  apiUrl: https://<YOUR_TENANT_ID>.live.dynatrace.com/api
  tokens: dynakube
  skipCertCheck: false
  oneAgent:
    cloudNativeFullStack:
      namespaceSelector:
        matchLabels:
          dynatrace: "enabled"
      args:
        - --set-host-group=orders-demo
  activeGate:
    capabilities:
      - routing
      - kubernetes-monitoring
      - dynatrace-api
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1.5Gi
