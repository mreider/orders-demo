name: "SDv2 demo / 08 Every endpoint is baselined"
type: notebook
content:
  defaultTimeframe:
    from: now()-24h
    to: now()
  sections:
    - id: 00000000-0000-0000-3101-000000000001
      type: markdown
      markdown: |-
        # Every endpoint is baselined

        Pick a production service. Replace `<YOUR_SERVICE_NAME>` with its `dt.service.name`.

    - id: 00000000-0000-0000-3101-000000000002
      type: markdown
      markdown: |-
        ## Question 1: What endpoints does this service have?

    - id: 00000000-0000-0000-3101-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries {
              throughput  = sum(dt.service.request.count),
              avg_rt      = avg(dt.service.request.response_time),
              p95_rt      = percentile(dt.service.request.response_time, 95),
              failures    = sum(dt.service.request.failure_count)
            },
            by: {endpoint.name},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-24h
            | filter endpoint.name != ""
            | sort arraySum(throughput) desc
            | limit 30
          timeframe:
            from: now()-24h
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3101-000000000004
      type: markdown
      markdown: |-
        Read:
        - Each row = one endpoint with its own throughput, latency, failure counts.
        - Low-throughput rows at the bottom = the long tail that used to roll up as `NON_KEY_REQUESTS`.

    - id: 00000000-0000-0000-3101-000000000005
      type: markdown
      markdown: |-
        ## Question 2: Confirm baselines exist per endpoint

    - id: 00000000-0000-0000-3101-000000000006
      type: dql
      state:
        input:
          value: |-
            timeseries {
              rt_p50 = percentile(dt.service.request.response_time, 50),
              rt_p95 = percentile(dt.service.request.response_time, 95),
              rt_p99 = percentile(dt.service.request.response_time, 99)
            },
            by: {endpoint.name},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-24h
            | filter endpoint.name != ""
            | sort arraySum(rt_p95) desc
            | limit 10
          timeframe:
            from: now()-24h
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-3101-000000000007
      type: markdown
      markdown: |-
        Read:
        - Percentiles per endpoint over 24 hours.
        - The dimension value (`endpoint.name`) is what the platform baselines against.
