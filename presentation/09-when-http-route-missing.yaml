name: "SDv2 demo / 09 When http.route is missing"
type: notebook
content:
  defaultTimeframe:
    from: now()-24h
    to: now()
  sections:
    - id: 00000000-0000-0000-3202-000000000001
      type: markdown
      markdown: |-
        # When http.route is missing

        Find tenant-wide where `GET /*` dominates, confirm the root cause, validate the URL pattern matching fix.

    - id: 00000000-0000-0000-3202-000000000002
      type: markdown
      markdown: |-
        ## Question 1: Find services with bad endpoint naming

    - id: 00000000-0000-0000-3202-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: {dt.service.name, endpoint.name},
            from: now()-24h
            | filter matches(endpoint.name, "^(GET|POST|PUT|DELETE|PATCH) /\\*$")
            | summarize bad_cnt = sum(arraySum(cnt)),
                by: {dt.service.name}
            | sort bad_cnt desc
            | limit 20
          timeframe:
            from: now()-24h
            to: now()
        visualization: barChart

    - id: 00000000-0000-0000-3202-000000000004
      type: markdown
      markdown: |-
        Read:
        - Top rows = services with most traffic hidden behind `METHOD /*`.
        - Zero rows = clean endpoint naming in your tenant.

    - id: 00000000-0000-0000-3202-000000000005
      type: markdown
      markdown: |-
        ## Question 2: Confirm http.route is the root cause

    - id: 00000000-0000-0000-3202-000000000006
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(dt.service.name, "<YOUR_PROBLEM_SERVICE>")
                AND span.kind == "server"
            | summarize span_count = count(),
                by: {http.route, http.request.method, endpoint.name}
            | sort span_count desc
            | limit 20
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3202-000000000007
      type: markdown
      markdown: |-
        Read:
        - `http.route` empty on most rows → framework isn't emitting it. URL normalization solves this.
        - `http.route` populated but `endpoint.name = /*` → check OneAgent version.
        - Both populated and clean → this service is fine; pick another.

    - id: 00000000-0000-0000-3202-000000000008
      type: markdown
      markdown: |-
        ## Question 3: Apply URL pattern matching (manual step)

        1. Settings > Service detection > URL path pattern matching.
        2. Add a pattern for the service (e.g. `/api/orders/{id}/items`).
        3. Wait 2-3 minutes, rerun Question 1. Problem service should drop off the list.

        Once automatic URL normalization ships for your tenant, this manual step becomes optional.
