name: "SDv2 demo / 07 The service.name workaround"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-2303-000000000001
      type: markdown
      markdown: |-
        # The service.name workaround

        Uses `orders-sdv1` with two Classic workloads that differ only in one env var:
        - `orders-demo` - no `OTEL_SERVICE_NAME`
        - `orders-demo-named` - `OTEL_SERVICE_NAME=orders-api`

    - id: 00000000-0000-0000-2303-000000000002
      type: markdown
      markdown: |-
        ## Question 1: Is service.name on the spans?

    - id: 00000000-0000-0000-2303-000000000003
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv1")
            | summarize span_count = count(),
                by: {service.name, k8s.workload.name}
            | sort k8s.workload.name asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-2303-000000000004
      type: markdown
      markdown: |-
        Read:
        - `orders-demo` rows: `service.name` empty.
        - `orders-demo-named` rows: `service.name = orders-api`.

    - id: 00000000-0000-0000-2303-000000000005
      type: markdown
      markdown: |-
        ## Question 2: Is service.name a queryable metric dimension?

    - id: 00000000-0000-0000-2303-000000000006
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: {service.name, k8s.workload.name},
            filter: matchesValue(k8s.namespace.name, "orders-sdv1"),
            from: now()-30m
            | sort k8s.workload.name asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-2303-000000000007
      type: markdown
      markdown: |-
        Read:
        - Named workload: `service.name` value is queryable.
        - Unnamed: `service.name` empty, still need entity-joined DQL.

    - id: 00000000-0000-0000-2303-000000000008
      type: markdown
      markdown: |-
        ## Question 3: Is dt.service.name prefixed?

    - id: 00000000-0000-0000-2303-000000000009
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: {dt.service.name, service.name, k8s.workload.name},
            filter: matchesValue(k8s.namespace.name, "orders-sdv1"),
            from: now()-30m
            | fields k8s.workload.name, service.name, dt.service.name
            | sort k8s.workload.name asc, dt.service.name asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-2303-00000000000a
      type: markdown
      markdown: |-
        Read:
        - `orders-demo`: raw `dt.service.name` (e.g. `orders-demo - OrderController`).
        - `orders-demo-named`: prefixed (`orders-api (orders-demo - OrderController)`).

    - id: 00000000-0000-0000-2303-00000000000b
      type: markdown
      markdown: |-
        ## Question 4: Does the `dt.service.name` fragmentation go away?

    - id: 00000000-0000-0000-2303-00000000000c
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv1")
            | summarize name_count = countDistinctExact(dt.service.name),
                by: {k8s.workload.name}
            | sort k8s.workload.name asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: barChart

    - id: 00000000-0000-0000-2303-00000000000d
      type: markdown
      markdown: |-
        Read:
        - Both workloads still show multiple `dt.service.name` values (per-controller, per-listener, aggregate, plus prefixed forms for the named one).
        - `service.name` fixes naming and queryability, not fragmentation. To collapse per-class identity to one-per-workload, you need SDv2 on the namespace.
