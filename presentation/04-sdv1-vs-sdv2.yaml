name: "SDv2 demo / 04 SDv1 vs SDv2, side by side"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-1104-000000000001
      type: markdown
      markdown: |-
        # SDv1 vs SDv2, side by side

        Uses `orders-demo` deployed into `orders-sdv1` (SDv1 default) + `orders-sdv2` (SDv2 opted in). Every query runs both sides.

    - id: 00000000-0000-0000-1104-000000000002
      type: markdown
      markdown: |-
        ## Question 1: `dt.service.name` fragmentation per namespace

    - id: 00000000-0000-0000-1104-000000000003
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.workload.name, "orders-demo")
                AND (matchesValue(k8s.namespace.name, "orders-sdv1")
                     OR matchesValue(k8s.namespace.name, "orders-sdv2"))
            | summarize name_count = countDistinctExact(dt.service.name),
                by: {k8s.namespace.name}
          timeframe:
            from: now()-30m
            to: now()
        visualization: barChart

    - id: 00000000-0000-0000-1104-000000000004
      type: markdown
      markdown: |-
        Read:
        - `orders-sdv1` → 4-7 `dt.service.name` values (fragmented per controller class, listener, aggregate).
        - `orders-sdv2` → 1 value (workload-level identity).
        - Same pods, same traffic, different identity modelling on top.

    - id: 00000000-0000-0000-1104-000000000005
      type: markdown
      markdown: |-
        ## Question 2: What are those fragments, exactly?

    - id: 00000000-0000-0000-1104-000000000006
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.workload.name, "orders-demo")
                AND (matchesValue(k8s.namespace.name, "orders-sdv1")
                     OR matchesValue(k8s.namespace.name, "orders-sdv2"))
            | summarize n = count(), by: {k8s.namespace.name, dt.service.name}
            | sort k8s.namespace.name asc, n desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1104-000000000007
      type: markdown
      markdown: |-
        Read:
        - `orders-sdv1` rows: multiple. Typical shapes are `orders-demo`, `orders-demo - OrderController`, `orders-demo - InventoryController`, `OrderEventsListener`. The per-class/per-listener fragmentation is the SDv1 identity model.
        - `orders-sdv2` rows: one, named `orders-sdv2 -- orders-demo`. All traffic (controllers, listener, JDBC clients) tags the same identity.
        - `DATABASE_SERVICE` for Postgres? Not here. Database identity lives on `db.*` + `server.*` attributes on the caller's span — see the Historical note in the module's markdown.

    - id: 00000000-0000-0000-1104-000000000008
      type: markdown
      markdown: |-
        ## Question 3: Activity totals are the same

    - id: 00000000-0000-0000-1104-000000000009
      type: dql
      state:
        input:
          value: |-
            timeseries reqs = sum(dt.service.request.count),
            by: {k8s.namespace.name},
            filter: matchesValue(k8s.workload.name, "orders-demo")
                AND in(k8s.namespace.name, array("orders-sdv1", "orders-sdv2")),
            from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1104-00000000000a
      type: markdown
      markdown: |-
        Read:
        - Two lines track each other. Underlying spans are identical.

    - id: 00000000-0000-0000-1104-00000000000b
      type: markdown
      markdown: |-
        ## Question 4: Query shape diverges

        ### SDv1 side (orders-sdv1) — group by `dt.service.name` to see every fragment

    - id: 00000000-0000-0000-1104-00000000000c
      type: dql
      state:
        input:
          value: |-
            timeseries reqs = sum(dt.service.request.count),
            by: {dt.service.name},
            filter: matchesValue(k8s.namespace.name, "orders-sdv1")
                AND matchesValue(k8s.workload.name, "orders-demo"),
            from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1104-00000000000d
      type: markdown
      markdown: |-
        ### SDv2 side (orders-sdv2) — filter to the one `dt.service.name`

    - id: 00000000-0000-0000-1104-00000000000e
      type: dql
      state:
        input:
          value: |-
            timeseries reqs = sum(dt.service.request.count),
            filter: matchesValue(dt.service.name, "orders-sdv2 -- orders-demo"),
            from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1104-00000000000f
      type: markdown
      markdown: |-
        Read:
        - SDv1 view: several series, one per fragmented identity. Useful if you want the per-class breakdown; awkward if you just wanted the workload total.
        - SDv2 view: one series. For per-endpoint detail, split by `endpoint.name` — the granularity moved off the identity name onto a first-class dimension.
