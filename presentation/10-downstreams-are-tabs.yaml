name: "SDv2 demo / 10 Downstreams are tabs, not entities"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-3303-000000000001
      type: markdown
      markdown: |-
        # Downstreams are tabs, not entities

        Three queries hit the data behind DB Queries, Message Processing, Outbound Calls. Replace `<YOUR_SERVICE_NAME>` with a service that makes downstream calls (demo: `orders-sdv2 -- orders-demo`).

    - id: 00000000-0000-0000-3303-000000000002
      type: markdown
      markdown: |-
        ## Question 1: Database queries from a service

    - id: 00000000-0000-0000-3303-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt = sum(dt.service.database.query.count),
              dur = avg(dt.service.database.query.duration)
            },
            by: {db.system.name, db.operation},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | filter db.system.name != ""
            | sort arraySum(cnt) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3303-000000000004
      type: markdown
      markdown: |-
        Read:
        - Each row = (database-system, operation) pair.
        - Same data the UI's DB Queries tab shows.

    - id: 00000000-0000-0000-3303-000000000005
      type: markdown
      markdown: |-
        ## Question 2: Message processing (consume + publish)

    - id: 00000000-0000-0000-3303-000000000006
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt = sum(dt.service.messaging.process.count),
              dur = avg(dt.service.messaging.process.duration),
              fails = sum(dt.service.messaging.process.failure_count)
            },
            by: {messaging.destination.name, messaging.system, messaging.operation},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | filter messaging.destination.name != ""
            | sort arraySum(cnt) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3303-000000000007
      type: markdown
      markdown: |-
        Read:
        - Rows split by destination, system, and operation (`publish` or `process`).
        - Publish and consume on the same service entity.

    - id: 00000000-0000-0000-3303-000000000008
      type: markdown
      markdown: |-
        ## Question 3: Outbound HTTP calls

    - id: 00000000-0000-0000-3303-000000000009
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>")
                AND span.kind == "client"
                AND isNotNull(server.address)
            | summarize {
                cnt = count(),
                avg_dur = avg(duration)
              },
              by: {server.address, http.request.method}
            | sort cnt desc
            | limit 20
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3303-00000000000a
      type: markdown
      markdown: |-
        Read:
        - Every outbound host called, with count and avg duration.
        - None of these appear as separate `EXTERNAL_SERVICE` rows in the Services list — they're this service's outbound view.
