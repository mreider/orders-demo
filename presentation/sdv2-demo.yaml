id: e29c4637-1830-4a8a-acb5-08f689788bd7
name: "SDv2 demo"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-1100-000000000001
      type: markdown
      markdown: |-
        # SDv2 demo

        A migration walkthrough for Dynatrace customers moving from Service Detection v1 to Service Detection v2 on OneAgent-monitored workloads.

        > **The shift in one sentence:**
        > SDv1 creates a separate `dt.entity.service` for every controller class and Kafka listener on a single Kubernetes workload. SDv2 collapses all of them to one `UNIFIED` entity, and the per-controller / per-queue detail moves onto first-class metric dimensions (`endpoint.name`, `messaging.destination.name`, etc.).

        One notebook, two parts, ten DQL questions.

        **Part 1 — One workload, one service** (questions 1-4): how SDv2 collapses the `dt.service.name` and `dt.entity.service` fragmentation that SDv1 produces. A short detour covers a separate 2026-Q1 fix — Dynatrace service naming rules (`builtin:naming.services`) are deprecated, so SDv1 detection now prefixes every fragment with `service.name` as a short-term bridge until pipeline-side naming takes over (Part 2's "What's coming"). [Narrative on GitHub.](https://github.com/mreider/orders-demo/blob/main/presentation/01-one-workload-one-service.md)

        **Part 2 — Dimensions do the slicing** (questions 5-10, plus 9b): metric families, the legacy `request.*`-for-messaging overlap that goes away in a future SDv2-for-OneAgent release, `endpoint.name`, downstreams as dimensions on the caller, metric-first DQL, and a side-by-side of the "fake" SDv1 DB service (measured on the caller) vs the real source-side Postgres metrics that will own health once database topology linking lands. [Narrative on GitHub.](https://github.com/mreider/orders-demo/blob/main/presentation/02-dimensions-do-the-slicing.md)

        Demo tenant uses `orders-sdv1` / `orders-sdv2` namespaces with workload `orders-demo` (plus `orders-demo-named` in sdv1 for the prefix comparison). Replace with your own namespace/workload to run against your tenant.

    - id: 00000000-0000-0000-1100-000000000002
      type: markdown
      markdown: |-
        ## Before you start: is the companion demo workload running?

        The `orders-demo` Spring Boot app provides the traffic shape every question below queries for. If the answer here is empty, loadgens have stopped; re-apply `k8s/40-load.yaml` and `k8s/41-load-named.yaml` from the [repo](https://github.com/mreider/orders-demo) and wait 60 seconds.

    - id: 00000000-0000-0000-1100-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
              by: {k8s.namespace.name, k8s.workload.name},
              filter: matchesValue(k8s.workload.name, "orders-demo")
                   OR matchesValue(k8s.workload.name, "orders-demo-named"),
              from: now()-5m
            | sort k8s.namespace.name asc, k8s.workload.name asc
          timeframe:
            from: now()-5m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1100-000000000004
      type: markdown
      markdown: |-
        **Expected when the demo is live:**

        - `orders-sdv1` + `orders-demo` — baseline SDv1 workload
        - `orders-sdv1` + `orders-demo-named` — with `OTEL_SERVICE_NAME=orders-api`
        - `orders-sdv2` + `orders-demo` — SDv2 detection

        Three rows, traffic flowing. If you've got that, you're ready — start with Question 1 below.

    - id: 00000000-0000-0000-1101-000000000001
      type: markdown
      markdown: |-
        ## Question 1: How many distinct `dt.service.name` values does this workload produce?

        The single-most-useful diagnostic. One row → SDv2. Three-plus rows → SDv1.

    - id: 00000000-0000-0000-1101-000000000002
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv1")
                AND matchesValue(k8s.workload.name, "orders-demo")
            | summarize span_count = count(), by: {dt.service.name}
            | sort span_count desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1101-000000000003
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv2")
                AND matchesValue(k8s.workload.name, "orders-demo")
            | summarize span_count = count(), by: {dt.service.name}
            | sort span_count desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1101-000000000004
      type: markdown
      markdown: |-
        Read:

        - SDv1 produces per-controller and per-listener fragments. Expect four rows for `orders-demo`: `orders-demo - OrderController`, `orders-demo - InventoryController`, `OrderEventsListener`, plus `orders-demo` (actuator).
        - SDv2 collapses all of them to one row, typically `<namespace> -- <workload>`.
        - If SDv1 shows only one row, loadgen isn't running — the actuator handler emits a single name; controllers and Kafka listeners only fragment when they actually process traffic.

    - id: 00000000-0000-0000-1101-000000000005
      type: markdown
      markdown: |-
        ## Question 2: How many `dt.entity.service` entities does one workload back onto?

        The fragmentation isn't just naming. SDv1 creates a separate service entity per controller class and per Kafka listener.

    - id: 00000000-0000-0000-1101-000000000006
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv1")
                OR matchesValue(k8s.namespace.name, "orders-sdv2")
            | filter matchesValue(k8s.workload.name, "orders-demo")
            | summarize
                entities = countDistinctExact(dt.entity.service),
                names = countDistinctExact(dt.service.name),
                by: {k8s.namespace.name}
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1101-000000000007
      type: markdown
      markdown: |-
        Read:

        - `orders-sdv1` (SDv1): four entities, four names. Each controller class and the Kafka listener get their own `dt.entity.service` with independent health, baselines, and alerts.
        - `orders-sdv2` (SDv2): one entity, one name. The per-class detail moves to metric dimensions on that single entity (question 6 onward).
        - Both queries stay on the spans stream — `dt.entity.service` and `dt.service.name` are first-class dimensions, no entity-table join needed.

    - id: 00000000-0000-0000-1101-000000000008
      type: markdown
      markdown: |-
        ## Question 3: Does `service.name` fix the names?

        Same image, two SDv1 workloads. Only `orders-demo-named` has `OTEL_SERVICE_NAME=orders-api` set.

    - id: 00000000-0000-0000-1101-000000000009
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv1")
                AND (matchesValue(k8s.workload.name, "orders-demo")
                     OR matchesValue(k8s.workload.name, "orders-demo-named"))
            | summarize span_count = count(), by: {k8s.workload.name, service.name, dt.service.name}
            | sort k8s.workload.name asc, span_count desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1101-00000000000a
      type: markdown
      markdown: |-
        Read:

        - `orders-demo` rows have `service.name` empty and bare `dt.service.name` fragments.
        - `orders-demo-named` rows carry `service.name = orders-api` and every `dt.service.name` fragment is prefixed: `orders-api (orders-demo - OrderController)` etc.
        - `service.name` is now a queryable metric dimension. `filter service.name == "orders-api"` cuts across every SDv1 fragment without an entity lookup.
        - UI caveat: the prefix lands in metrics and spans today. `entity.name` in the Services app does not yet carry the prefix — the list-view UI update is pending.

    - id: 00000000-0000-0000-1101-00000000000b
      type: markdown
      markdown: |-
        ## Question 4: What does the fragmentation look like as a throughput chart?

    - id: 00000000-0000-0000-1101-00000000000c
      type: dql
      state:
        input:
          value: |-
            timeseries request_rate = sum(dt.service.request.count),
              by: {dt.service.name},
              filter: matchesValue(k8s.namespace.name, "orders-sdv1")
                AND matchesValue(k8s.workload.name, "orders-demo"),
              from: now()-30m
            | sort arraySum(request_rate) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1101-00000000000d
      type: dql
      state:
        input:
          value: |-
            timeseries request_rate = sum(dt.service.request.count),
              by: {dt.service.name},
              filter: matchesValue(k8s.namespace.name, "orders-sdv2")
                AND matchesValue(k8s.workload.name, "orders-demo"),
              from: now()-30m
            | sort arraySum(request_rate) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1101-00000000000e
      type: markdown
      markdown: |-
        Read: SDv1 shows multiple lines, one per controller class. SDv2 shows one line. Identical traffic; just different modelling.

    - id: 00000000-0000-0000-1102-000000000001
      type: markdown
      markdown: |-
        # Part 2 — Dimensions do the slicing

        Under SDv2 the per-endpoint and per-downstream detail moves onto metric dimensions of the one service entity. Questions 5-9 exercise that shift.

    - id: 00000000-0000-0000-1102-000000000002
      type: markdown
      markdown: |-
        ## Question 5: What metric families does this service produce?

        Three families cover entry-point activity: HTTP/gRPC requests, messaging consumption, FaaS invocations. The UI's **Transactions** column is the coalesced sum across all three.

        The Spring Boot `orders-demo` app produces two of the three. `dt.service.faas_invoke.*` only exists when a Lambda / Azure Function invokes the service, which isn't the case here — it's shown separately below so its absence is a data point, not a query error.

    - id: 00000000-0000-0000-1102-000000000003
      type: dql
      state:
        input:
          value: |-
            // Request + messaging for the SDv2 workload.
            // Combining these in one timeseries works because both families carry
            // k8s.namespace.name and k8s.workload.name as dimensions.
            timeseries {
              requests  = sum(dt.service.request.count),
              messaging = sum(dt.service.messaging.process.count)
            },
            filter: k8s.namespace.name == "orders-sdv2"
              AND k8s.workload.name == "orders-demo",
            from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1102-000000000030
      type: dql
      state:
        input:
          value: |-
            // FaaS family on its own — expected to be empty on a K8s Spring Boot app.
            // Query returns one series with all-null values, confirming the family
            // is absent for this workload rather than an error.
            timeseries faas = sum(dt.service.faas_invoke.count),
              filter: k8s.namespace.name == "orders-sdv2"
                AND k8s.workload.name == "orders-demo",
              from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1102-000000000004
      type: markdown
      markdown: |-
        Read: `orders-demo` populates `request.*` (k6 hitting /orders, /inventory) and `messaging.process.*` (Kafka consume on `order-events`). `faas_invoke.*` stays empty because nothing is invoking this service from a serverless trigger.

        **Why two queries instead of one.** Combining metrics in a single `timeseries { a=..., b=..., c=... }` block only returns data when **every** metric has at least one matching series under the filter. If even one of the three is empty — as `faas_invoke` is here — the combined block returns zero rows. Splitting the empty family into its own query keeps the useful signal visible.

    - id: 00000000-0000-0000-1102-000000000020
      type: markdown
      markdown: |-
        ## Question 6: Where does the legacy `request.*`-for-messaging overlap show up?

        Kafka consume activity currently double-counts: it shows up in both `dt.service.request.*` (a legacy behavior from before dedicated messaging families existed) and `dt.service.messaging.process.*` (the modern home). Goes away **in a future SDv2-for-OneAgent release** — `request.*` will then be HTTP-only.

    - id: 00000000-0000-0000-1102-000000000021
      type: dql
      state:
        input:
          value: |-
            timeseries {
              as_request = sum(dt.service.request.count),
              as_messaging = sum(dt.service.messaging.process.count)
            },
            filter: dt.service.name == "OrderEventsListener"
              AND k8s.namespace.name == "orders-sdv1",
            from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1102-000000000022
      type: markdown
      markdown: |-
        Read: both series track each other at the same rate. Same Kafka consumes, counted twice under two families. On `request.*` the `endpoint.name` shows as `NON_KEY_REQUESTS` — a Classic artifact visible nowhere else. Don't sum families in alerts until the overlap clears in a future SDv2-for-OneAgent release.

    - id: 00000000-0000-0000-1102-000000000005
      type: markdown
      markdown: |-
        ## Question 7: Split the requests by `endpoint.name`.

        In SDv1 you'd switch between per-controller entities. In SDv2 it's one entity, split by dimension.

    - id: 00000000-0000-0000-1102-000000000006
      type: dql
      state:
        input:
          value: |-
            timeseries req = sum(dt.service.request.count),
              by: {endpoint.name, http.request.method},
              filter: matchesValue(k8s.namespace.name, "orders-sdv2")
                AND matchesValue(k8s.workload.name, "orders-demo"),
              from: now()-30m
            | sort arraySum(req) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1102-000000000007
      type: markdown
      markdown: |-
        Read: endpoints show as `GET /*`, `POST /*` — the fallback name used when `http.route` isn't set on server spans (Spring MVC + OneAgent on this build). Throughput is right, labels are not. Fix with URL path-pattern matching today, or wait for automatic URL normalization (rolling out Classic-first, then SDv2 opt-in).

    - id: 00000000-0000-0000-1102-000000000008
      type: markdown
      markdown: |-
        ## Question 8: Messaging — a dimension today, a broker entity tomorrow.

        Under SDv2 the Kafka consumer doesn't get its own service row — it's `dt.service.messaging.process.*` on the consuming service, split by `messaging.destination.name`.

        The broader vision mirrors DB: the real message broker (Kafka cluster, SQS queue) becomes the destination the metric links to, so queue depth, consumer lag, and alert ownership live on the broker — not on whichever consumer happened to notice lag first. That span-to-broker linking is less mature than the database equivalent; the broker-as-owner story for messaging is further out.

    - id: 00000000-0000-0000-1102-000000000009
      type: dql
      state:
        input:
          value: |-
            timeseries msg = sum(dt.service.messaging.process.count),
              by: {messaging.destination.name, messaging.system},
              filter: matchesValue(k8s.namespace.name, "orders-sdv2")
                AND matchesValue(k8s.workload.name, "orders-demo"),
              from: now()-30m
            | sort arraySum(msg) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1102-00000000000a
      type: markdown
      markdown: |-
        Read: one row, `messaging.destination.name = order-events`, `messaging.system = kafka`. Under SDv1 the same activity showed up as a separate `OrderEventsListener` service row (seen in question 1).

    - id: 00000000-0000-0000-1102-00000000000b
      type: markdown
      markdown: |-
        ## Question 9: Downstream DB calls — today and where they're going.

        SDv1 measures the client-side JDBC call and labels it the database. The "database service" latency in Classic is the round trip as seen from `orders-demo` — not what's actually happening inside Postgres.

        SDv2's target: `dt.service.database.*` metric written on the calling service, with the linking target being the **real DB entity** produced by a Postgres extension. Query latency, error rate, and alert ownership then roll up to the database itself.

        On this tenant the span data is already shaped correctly — `db.system="postgresql"`, `server.address=postgres`, plus `db.operation.name`. A telemetry-based topology pipeline that extracts those spans, matches them to the real DB entity (from a DB extension), and writes a service-level DB metric is actively in development. Landing in a future SDv2-for-OneAgent release; span instrumentation already matches what it expects.

    - id: 00000000-0000-0000-1102-00000000000c
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv2")
                AND matchesValue(k8s.workload.name, "orders-demo")
                AND span.kind == "client"
            | summarize span_count = count(), by: {server.address, db.operation.name, db.system}
            | sort span_count desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1102-00000000000d
      type: markdown
      markdown: |-
        Read: client spans to `postgres` on port 5432 with `db.operation.name` values (SELECT, INSERT, UPDATE, PREPARE) and `db.system=postgresql` — the attributes the future `dt.service.database.*` extractor will key off of. Until that chain ships, these stay as span-level facts on the caller rather than a metric family; `dt.service.database.*` does not populate on this tenant yet.

    - id: 00000000-0000-0000-1102-000000000020
      type: markdown
      markdown: |-
        ## Question 9b: Source truth vs client view — the "fake database service" story.

        Under SDv1 (and in the Classic services UI) a DATABASE_SERVICE entity appeared with its own latency, throughput, and alerts. That entity's numbers came entirely from the **caller's JDBC span** — what `orders-demo` saw when it issued the query. It was never the database's own view of itself.

        Two problems that flow from this:

        1. **Latency is network + server processing + serialization**, all bundled, measured on the caller. A slow run could be Postgres under load, a clogged pod network, or the driver doing TLS. You can't tell which from the "DB service" row alone.
        2. **Every caller gets its own version.** Multi-tenant Postgres? Ten services → ten DATABASE_SERVICE entities, ten different baselines, all talking about the same actual database.

        Side-by-side below: the client's view (what orders-demo measures) vs. what the real Postgres emits once a Dynatrace PostgreSQL extension is running. Automatic linking from those client spans to the real DB entity is in development and lands in a future SDv2-for-OneAgent release.

    - id: 00000000-0000-0000-1102-000000000021
      type: markdown
      markdown: |-
        **Client-side view (today — "fake" DB service perspective).** Span counts dimensioned by DB operation — this is what SDv1 turns into the DATABASE_SERVICE health numbers.

    - id: 00000000-0000-0000-1102-000000000022
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "orders-sdv2")
                AND matchesValue(k8s.workload.name, "orders-demo")
                AND span.kind == "client"
                AND server.address == "postgres"
            | summarize
                calls = count(),
                p50_ms = percentile(toDouble(duration) / 1000000, 50),
                p95_ms = percentile(toDouble(duration) / 1000000, 95),
                by: {db.operation.name}
            | sort calls desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1102-000000000023
      type: markdown
      markdown: |-
        **Source-side view (metrics FROM Postgres).** The Dynatrace `com.dynatrace.extension.otel-postgres` Hub extension scrapes a `postgres-exporter` Deployment in each namespace and the extension's built-in OTel Collector pipeline renames the Prometheus keys (`pg_stat_database_*` → `postgres.*`, `pg_stat_bgwriter_*` → `postgres.checkpoints_*`, etc.). These numbers come from Postgres itself — transactions, deadlocks, buffer hit/read activity — not from the caller's JDBC span.

        Alerts on `postgres.deadlocks` or `postgres.blk_read_time` fire on the database regardless of which service noticed the symptom. Multiple callers converge on one Postgres instance, one baseline, one problem.

        *(Note: on this tenant the extension pipeline consolidates both postgres-exporter sources into a single series — dimensions like `k8s.namespace.name` are stripped by the extension's managed OTel transform. `dt.metrics.source = "com.dynatrace.extension.otel-postgres"` is the only surviving dimension. For this demo the totals are clustered; in production you'd typically split by DB entity once the topology link ships.)*

    - id: 00000000-0000-0000-1102-000000000024
      type: dql
      state:
        input:
          value: |-
            // Transactions, deadlocks, cache hits — straight from Postgres via postgres-exporter + otel-postgres extension
            timeseries {
                connections = avg(postgres.num_backends),
                commits     = sum(postgres.xact_commit),
                rollbacks   = sum(postgres.xact_rollback),
                deadlocks   = sum(postgres.deadlocks),
                blks_hit    = sum(postgres.blks_hit),
                blks_read   = sum(postgres.blks_read)
              },
              from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1102-000000000026
      type: markdown
      markdown: |-
        Side-by-side interpretation:
        - **Client view (above)** counts every SELECT/INSERT/UPDATE the app *attempted*. Latency includes the network hop, the driver, the server's processing, and serialization. A spike here could come from any layer.
        - **Source view (just now)** shows what Postgres actually did — commits, rollbacks, deadlocks, cache hits per database. If `postgres.deadlocks` is rising while client INSERTs show high latency, that's server-side contention. If cache-hit ratio (`blks_hit / (blks_hit + blks_read)`) drops, you're reading cold. These diagnostics don't exist in the client-side view.

    - id: 00000000-0000-0000-1102-000000000027
      type: markdown
      markdown: |-
        ## Question 9c: Same story for Kafka — client view vs broker view.

        The SDv1-era `OrderEventsListener` service (from Question 1) is the messaging equivalent of the "fake database service": its health is what the **consumer** observed, not the broker's own view. SDv2 folds the consumer back onto the parent service as a `dt.service.messaging.process.*` dimension — but that's still a client-side measurement.

        The missing piece is the broker-side view: queue depth, partition distribution, consumer lag, request latency as the **broker** reports them. OneAgent's built-in Kafka sensor auto-detects Apache Kafka broker JVMs and emits `kafka.*` metrics directly — no extension config needed, just install a real Kafka (which this demo now does — `k8s/20-kafka.yaml` replaced the earlier Redpanda since Redpanda is C++ and doesn't expose JMX for OneAgent to introspect).

    - id: 00000000-0000-0000-1102-000000000028
      type: markdown
      markdown: |-
        **Client view (consumer perspective).** `dt.service.messaging.process.count` for the `orders-demo` SDv2 service, split by destination. This is what SDv1 turns into the `OrderEventsListener` service health numbers.

    - id: 00000000-0000-0000-1102-000000000029
      type: dql
      state:
        input:
          value: |-
            timeseries msg = sum(dt.service.messaging.process.count),
              by: {messaging.destination.name, messaging.system},
              filter: matchesValue(k8s.namespace.name, "orders-sdv2") AND matchesValue(k8s.workload.name, "orders-demo"),
              from: now()-30m
            | sort arraySum(msg) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1102-00000000002a
      type: markdown
      markdown: |-
        **Source view (broker perspective) — OneAgent's built-in Kafka sensor.** `kafka.consumer_group.lag` tells you how far behind each consumer group is; `kafka.request.time.99p` tells you broker request latency; `kafka.purgatory.size` tells you how many requests are waiting in the broker's purgatory. These reflect what the broker is actually experiencing, regardless of how many consumers are attached.

    - id: 00000000-0000-0000-1102-00000000002b
      type: dql
      state:
        input:
          value: |-
            // Broker-side Kafka metrics from OneAgent's built-in sensor
            timeseries {
                brokers        = avg(kafka.brokers),
                request_p99_ms = avg(kafka.request.time.99p),
                purgatory_size = avg(kafka.purgatory.size),
                consumer_lag   = sum(kafka.consumer_group.lag)
              },
              from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1102-00000000002c
      type: markdown
      markdown: |-
        Putting DB and messaging side-by-side:

        | | **Caller/client view** | **Source/infrastructure view** |
        |---|---|---|
        | DB | client JDBC span count + latency | `postgres.*` from postgres-exporter → otel-postgres extension |
        | Messaging | `dt.service.messaging.process.count` on the consumer | `kafka.*` from OneAgent built-in Kafka sensor |

        **The gap that lands in a future SDv2-for-OneAgent release.** Today these two worlds — the client's view and the source view — are independent; you manually correlate them by time. A telemetry-based topology pipeline, in active development, adds the missing link for DB: `dt.service.database.*` metrics written on the calling service that **point at the real DB entity**. Same data shape as today, but the owner changes — queries and alerts anchor on the database, not on a caller's surrogate.

        The messaging equivalent (producer/consumer span → broker entity) is less mature; the broker-as-owner destination for messaging is further out. Until then, `kafka.*` metrics live on the broker entity and `messaging.process.*` live on the caller; they're two independent worlds held together by a human looking at two charts.

    - id: 00000000-0000-0000-1102-00000000000e
      type: markdown
      markdown: |-
        ## Question 10: Metric-first vs entity-first DQL.

        Same question — requests per endpoint on `orders-sdv2 -- orders-demo` — written two ways. The Latest shape stays on the metric stream and uses `dt.service.name` as a dimension; no entity-table fetch required.

    - id: 00000000-0000-0000-1102-00000000000f
      type: dql
      state:
        input:
          value: |-
            // Classic shape: lookup via dt.entity.service
            fetch dt.entity.service
            | filter entity.name == "orders-sdv2 -- orders-demo"
            | fields dt.entity.service = id
            | lookup [timeseries req = sum(dt.service.request.count),
                        by: {endpoint.name, dt.entity.service}, from: now()-30m],
                sourceField: dt.entity.service, lookupField: dt.entity.service
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1102-000000000010
      type: dql
      state:
        input:
          value: |-
            // Latest shape: filter on the metric dimension directly
            timeseries req = sum(dt.service.request.count),
              by: {endpoint.name},
              filter: dt.service.name == "orders-sdv2 -- orders-demo",
              from: now()-30m
            | sort arraySum(req) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1102-000000000011
      type: markdown
      markdown: |-
        Read: same answer. Fewer lines, fewer scanned records, and stable across entity re-detection — dimension values don't change when entity IDs do.
