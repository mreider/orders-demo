name: "Curriculum / Capstone - One service, full walkthrough"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-9999-000000000001
      type: markdown
      markdown: |-
        # Capstone - One service, full walkthrough

        *The entire curriculum, applied to one workload in one notebook.*

        Pick a workload in your tenant. Fill in the placeholders below:

        - `<YOUR_NAMESPACE>` = your workload's k8s.namespace.name
        - `<YOUR_WORKLOAD>` = your workload's k8s.workload.name
        - `<YOUR_SERVICE_NAME>` = the dt.service.name for your workload
          (run Section 1's query first to find it)

    - id: 00000000-0000-0000-9999-000000000002
      type: markdown
      markdown: |-
        ## Section 1 - Identity (Unit 1.1)

        How many SERVICE entities represent this workload, and what's
        the service name on its metrics?

    - id: 00000000-0000-0000-9999-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count)
                           + sum(dt.service.messaging.process.count)
                           + sum(dt.service.faas_invoke.count),
            by: {dt.entity.service, dt.service.name, k8s.workload.name},
            filter: matchesValue(k8s.workload.name, "<YOUR_WORKLOAD>"),
            from: now()-30m
            | sort arraySum(cnt) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-9999-000000000004
      type: markdown
      markdown: |-
        One row => you're on Latest. Multiple rows => Classic fragmenting.
        Note your `dt.service.name` for the queries below.

    - id: 00000000-0000-0000-9999-000000000005
      type: markdown
      markdown: |-
        ## Section 2 - Activity (Unit 1.2)

        Which of the three metric families does this workload emit?

    - id: 00000000-0000-0000-9999-000000000006
      type: dql
      state:
        input:
          value: |-
            timeseries {
              http  = sum(dt.service.request.count),
              msg   = sum(dt.service.messaging.process.count),
              faas  = sum(dt.service.faas_invoke.count)
            },
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-9999-000000000007
      type: markdown
      markdown: |-
        ## Section 3 - Slices (Unit 1.3)

        Split the service's HTTP traffic by endpoint, then by
        response status.

    - id: 00000000-0000-0000-9999-000000000008
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: {endpoint.name, http.response.status_code},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | sort arraySum(cnt) desc
            | limit 20
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-9999-000000000009
      type: markdown
      markdown: |-
        ## Section 4 - Naming (Unit 2.1)

        Where does this service's name come from? Look at the span
        resource attributes feeding it.

    - id: 00000000-0000-0000-9999-00000000000a
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-15m
            | filter matchesValue(k8s.workload.name, "<YOUR_WORKLOAD>")
            | summarize span_count = count(),
                by: {service.name, k8s.workload.name, k8s.namespace.name}
            | sort span_count desc
          timeframe:
            from: now()-15m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-9999-00000000000b
      type: markdown
      markdown: |-
        If `service.name` is populated, the Latest model is using it
        directly. If empty, it fell back to `k8s.workload.name`.

    - id: 00000000-0000-0000-9999-00000000000c
      type: markdown
      markdown: |-
        ## Section 5 - Query shape (Unit 2.2)

        This is the single-query answer to "top 10 endpoints by p95
        response time" - the kind of thing a dashboard or alert would
        run. Note the absence of `fetch dt.entity.service | lookup`.

    - id: 00000000-0000-0000-9999-00000000000d
      type: dql
      state:
        input:
          value: |-
            timeseries p95 = percentile(dt.service.request.response_time, 95),
            by: {endpoint.name},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | sort arraySum(p95) desc
            | limit 10
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-9999-00000000000e
      type: markdown
      markdown: |-
        ## Section 6 - Endpoints health (Units 3.1 + 3.2)

        Full per-endpoint picture. Flag any `METHOD /*` rows as the
        http.route gap (Module 3.2).

    - id: 00000000-0000-0000-9999-00000000000f
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt      = sum(dt.service.request.count),
              rt_p95   = percentile(dt.service.request.response_time, 95),
              failures = sum(dt.service.request.failure_count)
            },
            by: {endpoint.name},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | filter endpoint.name != ""
            | fieldsAdd route_gap = if(matches(endpoint.name, "^(GET|POST|PUT|DELETE|PATCH) /\\*$"), "MISSING http.route", else: "ok")
            | sort arraySum(cnt) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-9999-000000000010
      type: markdown
      markdown: |-
        ## Section 7 - Downstreams (Unit 3.3)

        What does this service talk to?

    - id: 00000000-0000-0000-9999-000000000011
      type: dql
      state:
        input:
          value: |-
            timeseries {
              db_cnt  = sum(dt.service.database.query.count),
              msg_cnt = sum(dt.service.messaging.process.count)
            },
            by: {db.system.name, messaging.system, messaging.destination.name},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | sort arraySum(db_cnt) + arraySum(msg_cnt) desc
            | limit 15
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-9999-000000000012
      type: markdown
      markdown: |-
        ## Section 8 (optional) - Side-by-side (Unit 1.4)

        If you have another workload running the same code under a
        different detection mode, compare entity counts here. Replace
        the second namespace filter.

    - id: 00000000-0000-0000-9999-000000000013
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.workload.name, "<YOUR_WORKLOAD>")
                AND in(k8s.namespace.name, array("<NAMESPACE_A>", "<NAMESPACE_B>"))
            | summarize entity_count = countDistinctExact(dt.entity.service),
                by: {k8s.namespace.name}
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-9999-000000000014
      type: markdown
      markdown: |-
        ## What you just did

        You ran the entire curriculum on one workload.

        - Section 1 confirmed your identity model.
        - Section 2 showed what's measured.
        - Section 3 demonstrated attribute-first slicing.
        - Section 4 traced naming.
        - Section 5 proved metric-first query ergonomics.
        - Section 6 surfaced endpoint-level health.
        - Section 7 relocated downstreams from "entities" to "tabs."
        - Section 8 (optional) made the Classic-vs-Latest delta
          empirical.

        Share this notebook URL with a colleague. The queries are live;
        they only need to swap the placeholder values for their own
        workload and they've done the curriculum in 30 minutes.

        That's it. Go ship.
