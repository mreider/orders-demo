name: "Curriculum / Module 3.3 - Downstreams are tabs, not entities"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-3303-000000000001
      type: markdown
      markdown: |-
        # Module 3.3 - Downstreams are tabs, not entities

        *Unit 3: Endpoints, dependencies, scale - Module 3 of 4.*

        Three queries hit the data behind the DB Queries, Message
        Processing, and Outbound Calls tabs directly. You'll see the
        same shape (service filter, dimension for the downstream) for
        all three.

        Replace `<YOUR_SERVICE_NAME>` with a service that makes
        downstream calls (databases, queues, or external HTTP). If
        you're using the demo, `orders-sdv2 -- orders-demo` works.

    - id: 00000000-0000-0000-3303-000000000002
      type: markdown
      markdown: |-
        ## Question 1: Database queries from a service

        The DB Queries tab's underlying data. No DATABASE_SERVICE entity
        needed - the service filter + db dimensions give you the same
        breakdown.

    - id: 00000000-0000-0000-3303-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt = sum(dt.service.database.query.count),
              dur = avg(dt.service.database.query.duration)
            },
            by: {db.system.name, db.operation},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | filter db.system.name != ""
            | sort arraySum(cnt) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3303-000000000004
      type: markdown
      markdown: |-
        **Read the result:**

        Each row is a (database-system, operation) pair the service
        made queries against. Count and average duration per
        combination. That's what the DB Queries tab shows you in the
        UI - this is the DQL behind it.

    - id: 00000000-0000-0000-3303-000000000005
      type: markdown
      markdown: |-
        ## Question 2: Message processing (consume + publish)

        Consume side is `dt.service.messaging.process.*`. Publish side
        (which was harder to find in Classic's MESSAGING_SERVICE entity)
        sits on the same metric family on the calling service.

    - id: 00000000-0000-0000-3303-000000000006
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt = sum(dt.service.messaging.process.count),
              dur = avg(dt.service.messaging.process.duration),
              fails = sum(dt.service.messaging.process.failure_count)
            },
            by: {messaging.destination.name, messaging.system, messaging.operation},
            filter: matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>"),
            from: now()-30m
            | filter messaging.destination.name != ""
            | sort arraySum(cnt) desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3303-000000000007
      type: markdown
      markdown: |-
        **Read the result:**

        Rows split by destination (queue/topic name), system (Kafka,
        SQS, etc.), and operation (`publish` or `process`). You can
        see publish and consume on the same service entity without
        walking between two separate entities as Classic required.

    - id: 00000000-0000-0000-3303-000000000008
      type: markdown
      markdown: |-
        ## Question 3: Outbound HTTP calls

        The Outbound Calls tab covers external HTTP, including calls
        to recognized third parties and internal downstream services
        that aren't otherwise in your tenant's topology.

    - id: 00000000-0000-0000-3303-000000000009
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(dt.service.name, "<YOUR_SERVICE_NAME>")
                AND span.kind == "client"
                AND isNotNull(server.address)
            | summarize {
                cnt = count(),
                avg_dur = avg(duration)
              },
              by: {server.address, http.request.method}
            | sort cnt desc
            | limit 20
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-3303-00000000000a
      type: markdown
      markdown: |-
        **Read the result:**

        Every outbound HTTP host the service called, with call count
        and average duration. If any of those hosts correspond to
        recognized third parties, they'd also show up in
        `dt.service.thirdparty.*` metrics with finer-grained
        dimensions.

        What you don't see: any of these hosts as separate
        `EXTERNAL_SERVICE` entities in the Services list. They used
        to be. Now they're the calling service's outbound view.

    - id: 00000000-0000-0000-3303-00000000000b
      type: markdown
      markdown: |-
        ## What you just learned

        1. Database, messaging, and outbound HTTP are three tabs on
           the calling service, not separate entities.
        2. The DQL shape is the same for all three: filter to the
           calling service, group by the downstream dimension.
        3. Customers asking "where did my Queue Listener / Database
           Service / External Service go" are looking for tabs, not
           missing rows in the Services list.

        **Next:** [Module 3.4 - What's coming: SERVICE_DEPLOYMENT for
        per-environment views](#).
