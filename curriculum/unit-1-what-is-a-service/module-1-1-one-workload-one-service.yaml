name: "Curriculum / Module 1.1 - One workload, one service"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-1101-000000000001
      type: markdown
      markdown: |-
        # Module 1.1 - One workload, one service

        Pick a K8s workload. Replace `<YOUR_NAMESPACE>` and `<YOUR_WORKLOAD>` in each query (or use `orders-sdv1` / `orders-sdv2` + `orders-demo`).

    - id: 00000000-0000-0000-1101-000000000002
      type: markdown
      markdown: |-
        ## Question 1: How many SERVICE entities does this workload produce?

    - id: 00000000-0000-0000-1101-000000000003
      type: dql
      state:
        input:
          value: |-
            fetch spans, from: now()-30m
            | filter matchesValue(k8s.namespace.name, "<YOUR_NAMESPACE>")
                AND matchesValue(k8s.workload.name, "<YOUR_WORKLOAD>")
            | summarize span_count = count(), by: {dt.entity.service}
            | sort span_count desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: singleValue

    - id: 00000000-0000-0000-1101-000000000004
      type: markdown
      markdown: |-
        Read:
        - 1 row → Latest (UNIFIED) for this namespace.
        - 2-10+ rows → Classic fragmentation.
        - 0 rows → widen timeframe or check filter values.

    - id: 00000000-0000-0000-1101-000000000005
      type: markdown
      markdown: |-
        ## Question 2: Which detection model is this namespace on?

    - id: 00000000-0000-0000-1101-000000000006
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter contains(entity.name, "<YOUR_WORKLOAD>")
            | fields id, entity.name, serviceType
            | sort entity.name asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-1101-000000000007
      type: markdown
      markdown: |-
        Read:
        - `serviceType = UNIFIED` → Latest.
        - `WEB_REQUEST_SERVICE` + `WEB_SERVICE` + `MESSAGING_SERVICE` + sometimes `DATABASE_SERVICE` → Classic.
        - Mixed → namespace is in transition.

    - id: 00000000-0000-0000-1101-000000000008
      type: markdown
      markdown: |-
        ## Question 3: What does each entity represent?

    - id: 00000000-0000-0000-1101-000000000009
      type: dql
      state:
        input:
          value: |-
            timeseries request_rate = sum(dt.service.request.count),
            by: {dt.entity.service},
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter contains(svc.entity.name, "<YOUR_WORKLOAD>")
            | fields svc.entity.name, svc.serviceType, request_rate
            | sort svc.serviceType asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart

    - id: 00000000-0000-0000-1101-00000000000a
      type: markdown
      markdown: |-
        Read:
        - Latest: one series.
        - Classic: four or more, each a separate entity.
        - The `lookup` step is Classic's query tax (Module 2.2 removes it).
