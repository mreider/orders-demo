type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-0002-000000000001
      type: markdown
      markdown: |-
        # Rung 2: Optimally sliced SDv2 - attribute is the unit

        The anchor showed SDv2 produces one UNIFIED entity for this
        workload. Rung 1 showed SDv1's splits can be refined with
        enhanced endpoints, but the entity surface stays fragmented -
        and those fragments are faux entities: pieces of one deployed
        workload dressed up as separate services.

        SDv2 right-sizes the concept of service identity to the modern
        deployment unit. In Kubernetes that is the workload (Deployment,
        StatefulSet). In Lambda it is the function. In ECS it is the
        task. One runnable unit, one team, one service. Controllers and
        listeners inside that unit are *internal organization*, not
        separate services. SDv2 expresses that structurally: one entity
        per workload, with controllers and destinations as dimension
        values.

        Now look at the SDv2 side. Same JVM, same routes, same Kafka
        listener. One entity. The same axes SDv1 split into entities
        (controller, listener, destination) are available as dimensions
        of that one entity.

        **No configuration was applied** to the SDv2 side. The splits
        below are free.
    - id: 00000000-0000-0000-0002-000000000002
      type: markdown
      markdown: |-
        ## 1. All endpoints on the UNIFIED service, in one query
    - id: 00000000-0000-0000-0002-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt    = sum(dt.service.request.count),
              avg_rt = avg(dt.service.request.response_time),
              p95_rt = percentile(dt.service.request.response_time, 95),
              failed = sum(dt.service.request.failure_count)
            },
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields endpoint.name, cnt, avg_rt, p95_rt, failed
            | sort cnt desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: areaChart
    - id: 00000000-0000-0000-0002-000000000004
      type: markdown
      markdown: |-
        **Result reading:** Every endpoint of the workload, on one
        service entity:

        - `InventoryController.check` - hottest, fastest (~18ms)
        - `OrderController.search` - moderate throughput, longest tail
          (~200ms p95 with high variance due to loose-envelope queries)
        - `OrderController.submit` - strict-envelope writes (~135ms avg)
        - `order-events process` - Kafka consumer, appears as a peer
          endpoint (messaging spans detected via
          `messaging.destination.name` + `messaging.operation`)
        - `GET /*` - unmatched routes (`/actuator/health` etc.)

        > **SDv2 does not split at detection.** Controller, listener,
        > and destination all become values of the `endpoint.name`
        > dimension on the one entity. Baselines attach to dimension
        > values, not to entities.

        **Naming mechanism:** `http.route` IS emitted on every server
        span (`/orders/submit`, `/orders/search`, `/inventory/check`),
        and the SDv2 unified ruleset has an `http.route` rule that
        would name endpoints `GET /orders/search`. But OneAgent's Java
        sensor writes `endpoint.name = {class}.{method}` directly onto
        the servlet-filter span *at capture time*, and the ruleset
        only applies to spans that arrive without `endpoint.name` set.
        So on OneAgent-monitored Java workloads, class-method naming
        is the effective default. Rung 6 covers the roadmap for the
        separate gap (frameworks that genuinely lack `http.route`).

        ## 2. Confirm the controller axis is a dimension, not an entity
    - id: 00000000-0000-0000-0002-000000000005
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fieldsAdd controller = if(contains(endpoint.name, "."),
                                         splitString(endpoint.name, ".")[0],
                                         else: "other")
            | summarize total = sum(arraySum(cnt)), by: { controller }
            | sort total desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: pieChart
    - id: 00000000-0000-0000-0002-000000000006
      type: markdown
      markdown: |-
        **Result reading:** Three controller-level buckets emerge from
        grouping the `endpoint.name` dimension by its prefix:
        `InventoryController`, `OrderController`, and other (catch-all +
        the `order-events process` messaging peer).

        In SDv1, this same grouping is expressed by the fact that
        `OrderController` and `InventoryController` are *separate
        entities*. In SDv2, the grouping is expressed by *filtering a
        dimension on one entity*.

        > **Entity in SDv1 = dimension value in SDv2.** Same information,
        > different structural home.

        ## 3. The messaging side of the same entity
    - id: 00000000-0000-0000-0002-000000000007
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt    = sum(dt.service.messaging.process.count),
              failed = sum(dt.service.messaging.process.failure_count),
              avg_dur = avg(dt.service.messaging.process.duration)
            },
            by: { dt.entity.service, messaging.destination.name, messaging.system },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields messaging.destination.name, messaging.system, cnt, failed, avg_dur
          timeframe:
            from: now()-30m
            to: now()
        visualization: lineChart
    - id: 00000000-0000-0000-0002-000000000008
      type: markdown
      markdown: |-
        **Result reading:** The Kafka consumer metrics attach to the
        same `orders-sdv2 -- orders-demo` service as the HTTP endpoints,
        under the `dt.service.messaging.process.*` family with richer
        dimensions (`messaging.system`, `messaging.operation`). The
        `order-events` destination is a dimension value.

        In SDv1, this data lives on the separate `OrderEventsListener`
        MESSAGING_SERVICE entity (Rung 1, query 2).

        > **Transport in SDv1 = transport-family metric in SDv2.** HTTP
        > and messaging stay on the same identity, split into different
        > metric families with compatible dimensions.

        ## What you now know

        > On SDv2, the unit of slicing is the attribute. One UNIFIED
        > service carries all splits as metric dimensions. Controllers,
        > listeners, and destinations are dimension values, not separate
        > entities. Health measurement and config target the one
        > identity and filter by dimension.

        Next notebook: **03 - Measuring HTTP health both ways**.
