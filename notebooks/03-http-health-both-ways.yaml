name: "orders-demo / 03 - Measuring HTTP health both ways"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-0003-000000000001
      type: markdown
      markdown: |-
        # Rung 3: Measuring HTTP health both ways

        Three practical questions. Each answered twice - once with the
        SDv1 splitting idiom (filter by entity), once with the SDv2
        splitting idiom (filter by dimension on one entity).

        Watch the `filter` clause in each pair. The detection model
        determines whether the filter narrows by `svc.entity.name` (SDv1)
        or by `endpoint.name` (SDv2).
    - id: 00000000-0000-0000-0003-000000000002
      type: markdown
      markdown: |-
        ## Question 1: How busy is `OrderController`?

        **SDv1 answer (entity split)** - narrow to the
        `orders-demo - OrderController` WEB_SERVICE:
    - id: 00000000-0000-0000-0003-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-demo - OrderController"
            | fields endpoint.name, cnt
            | sort cnt desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0003-000000000004
      type: markdown
      markdown: |-
        **SDv2 answer (dimension split)** - narrow the one UNIFIED
        service to `endpoint.name` values that start with `OrderController.`:
    - id: 00000000-0000-0000-0003-000000000005
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
                AND startsWith(endpoint.name, "OrderController.")
            | fields endpoint.name, cnt
            | sort cnt desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0003-000000000006
      type: markdown
      markdown: |-
        **Result reading:** Same throughput (submit + search traffic),
        same rows. The aggregation math is identical. The `filter`
        changes to reflect where the split lives.

        > **SDv1 splits OrderController out as an entity** - filter by
        > `svc.entity.name` to enter that entity's scope.
        >
        > **SDv2 splits OrderController into `endpoint.name` values** -
        > filter by `startsWith(endpoint.name, "OrderController.")` to
        > get the same scope.

        ## Question 2: p95 response time of `/orders/submit`?

        **SDv1 (entity split) -> key request / endpoint inside
        OrderController:**
    - id: 00000000-0000-0000-0003-000000000007
      type: dql
      state:
        input:
          value: |-
            timeseries {
              p95 = percentile(dt.service.request.response_time, 95),
              cnt = sum(dt.service.request.count)
            },
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-demo - OrderController"
                AND endpoint.name == "submit"
            | fields endpoint.name, p95, cnt
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0003-000000000008
      type: markdown
      markdown: |-
        **SDv2 (dimension split) -> same metric, filter the one entity:**
    - id: 00000000-0000-0000-0003-000000000009
      type: dql
      state:
        input:
          value: |-
            timeseries {
              p95 = percentile(dt.service.request.response_time, 95),
              cnt = sum(dt.service.request.count)
            },
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
                AND endpoint.name == "OrderController.submit"
            | fields endpoint.name, p95, cnt
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0003-000000000010
      type: markdown
      markdown: |-
        **Result reading:** Same p95 metric, same arithmetic, two filter
        shapes. SDv1 walks `entity -> endpoint`; SDv2 walks
        `one entity -> dimension value`.

        > **Per-endpoint baselining works on both sides.** The
        > difference is structural: SDv1 baselines live under the
        > OrderController entity; SDv2 baselines live under the one
        > UNIFIED entity, keyed by dimension value.

        ## Question 3: Which endpoint is hottest across *all* of orders-demo?

        This is where the cost of SDv1's splits shows up. To answer it,
        SDv1 must re-combine the entities the splits separated.

        **SDv1 (entity split) -> aggregate across entities by name prefix:**
    - id: 00000000-0000-0000-0003-000000000011
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter contains(svc.entity.name, "orders-demo - ")
                AND svc.serviceType == "WEB_SERVICE"
            | fields svc.entity.name, endpoint.name, cnt
            | sort cnt desc
            | limit 10
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0003-000000000012
      type: markdown
      markdown: |-
        **SDv2 (dimension split) -> top-N the single dimension on one entity:**
    - id: 00000000-0000-0000-0003-000000000013
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields endpoint.name, cnt
            | sort cnt desc
            | limit 10
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0003-000000000014
      type: markdown
      markdown: |-
        **Result reading:** Same top-N list.

        SDv1 required knowing the naming convention
        (`contains(svc.entity.name, "orders-demo - ")`) to recombine
        separate entities. SDv2 did not, because the entities were never
        split in the first place.

        > The SDv1 split pushed aggregation work to the query author.
        > The SDv2 lack-of-split pushed the same work into the detection
        > layer instead. The answer is identical; the work moved.

        ## What you now know

        > HTTP health on SDv1 is read by entity; on SDv2 it is read by
        > dimension on the one entity. The underlying metric family
        > (`dt.service.request.*`) and arithmetic are the same. The
        > `filter` clause carries the difference.

        Next notebook: **04 - Measuring messaging health both ways**.
