        # DELETE THESE (UI cleanup)

        `dtctl 0.24.0 delete notebook <id>` returns `access denied to
        document` for every notebook on this tenant, including ones
        the same dtctl invocation just created. The delete path needs
        an OAuth scope dtctl isn't asking for. Filed as
        [dynatrace-oss/dtctl#160](https://github.com/dynatrace-oss/dtctl/issues/160).

        Meanwhile, the notebooks listed below accumulated while
        iterating on the ladder - earlier versions with wrong naming
        claims, pre-visualization-variety tables, and scratch tests.
        Click each link (opens in new tab), verify the ID in the URL
        matches, and **Delete** via the UI menu.

        Once deleted, this notebook can go too (last entry in the
        list).
