name: "orders-demo / 04 - Measuring messaging health both ways"
type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-0004-000000000001
      type: markdown
      markdown: |-
        # Rung 4: Measuring messaging health both ways

        Same comparison applied to the Kafka side of the app.

        SDv1 split the `@KafkaListener` into its own MESSAGING_SERVICE
        entity. SDv2 kept it on the UNIFIED service as a
        `messaging.destination.name` dimension value plus a peer endpoint.
        Same telemetry, different structural home.
    - id: 00000000-0000-0000-0004-000000000002
      type: markdown
      markdown: |-
        ## Question 1: Throughput of the `order-events` Kafka consumer?

        **SDv1 (entity split) -> separate MESSAGING_SERVICE:**
    - id: 00000000-0000-0000-0004-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.messaging.process.count),
            by: { dt.entity.service, messaging.destination.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "OrderEventsListener"
                AND svc.serviceType == "MESSAGING_SERVICE"
            | fields svc.entity.name, messaging.destination.name, cnt
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0004-000000000004
      type: markdown
      markdown: |-
        **SDv2 (dimension split) -> filter the UNIFIED service by
        destination:**
    - id: 00000000-0000-0000-0004-000000000005
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.messaging.process.count),
            by: { dt.entity.service, messaging.destination.name, messaging.system },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields messaging.destination.name, messaging.system, cnt
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0004-000000000006
      type: markdown
      markdown: |-
        **Result reading:** Same throughput. Same `order-events` row.
        What changed:

        > **SDv1 splits the Kafka listener to its own entity**
        > (`OrderEventsListener`, `MESSAGING_SERVICE`). Filter by
        > entity name.
        >
        > **SDv2 keeps the listener on the one UNIFIED service** and
        > splits by the `messaging.destination.name` dimension. Filter
        > by destination.

        ## Question 2: Failure rate on `order-events`?
    - id: 00000000-0000-0000-0004-000000000007
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt    = sum(dt.service.messaging.process.count),
              failed = sum(dt.service.messaging.process.failure_count)
            },
            by: { dt.entity.service, messaging.destination.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "OrderEventsListener"
                AND svc.serviceType == "MESSAGING_SERVICE"
            | fields svc.entity.name, messaging.destination.name, cnt, failed
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0004-000000000008
      type: dql
      state:
        input:
          value: |-
            timeseries {
              cnt    = sum(dt.service.messaging.process.count),
              failed = sum(dt.service.messaging.process.failure_count)
            },
            by: { dt.entity.service, messaging.destination.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields messaging.destination.name, cnt, failed
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0004-000000000009
      type: markdown
      markdown: |-
        **Result reading:** Both sides show the same failure pulse on
        `order-events` - driven by the 2% bad-message flag in the load
        generator. The failure counts attach to two different entities
        on SDv1 and to the one UNIFIED entity on SDv2.

        > Failure rate arithmetic is identical. The split determines
        > which entity *owns* the failure metric. That ownership, in
        > turn, determines which alerts and dashboards need wiring.

        ## Question 3: What happens when we add a second `@KafkaListener`?

        Suppose tomorrow the app gains a `NotificationListener` for a
        `notifications` topic. Run the same SDv2 query:
    - id: 00000000-0000-0000-0004-000000000010
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.messaging.process.count),
            by: { dt.entity.service, messaging.destination.name, messaging.system },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields messaging.destination.name, messaging.system, cnt
            | sort cnt desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0004-000000000011
      type: markdown
      markdown: |-
        **Result reading:** Today only `order-events` appears. If
        `notifications` were added, a second row would surface
        automatically - with its own baseline attached to the
        `messaging.destination.name` dimension.

        On SDv1, the new listener would produce a new MESSAGING_SERVICE
        entity (say, `NotificationListener`). Dashboards, alerts, and
        tagging rules scoped to `OrderEventsListener` would **not**
        cover it. Each new split demands its own wiring.

        > **Adding a listener on SDv1 = new entity = new config surface.**
        >
        > **Adding a listener on SDv2 = new dimension value = no config
        > surface change.**

        ## Roadmap note

        Today SDv2 also surfaces the consumer as an endpoint
        (`order-events process`) in `dt.service.request.*`-style queries.
        This is being removed (new tenants first) to stop mixing
        messaging data into HTTP endpoint baselines. The queries in this
        notebook already use the messaging family, so they survive that
        change. See Notebook 06.

        ## What you now know

        > Messaging health on SDv1 splits into a dedicated entity per
        > listener. On SDv2 it splits into dimension values on the one
        > UNIFIED service. Same arithmetic, same metric family. The
        > cost of maintenance on SDv1 grows linearly with every new
        > split; on SDv2 it does not.

        Next notebook: **05 - Measuring end-to-end failure**.
