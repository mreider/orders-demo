    - id: 00000000-0000-0000-0006-000000000001
      type: markdown
      markdown: |-
        # Rung 6: Where this is going

        The previous rungs are grounded in today's tenant state. Three
        pieces are still in motion. All of them reinforce the
        "splitting -> dimensions" arc: the product keeps moving axes
        that used to be splits into attributes on one identity.
    - id: 00000000-0000-0000-0006-000000000002
      type: markdown
      markdown: |-
        ## 1. Endpoint naming: URL normalization fills the `http.route` gap

        This demo is **not** an example of the `http.route` gap. Every
        Spring server span carries `http.route`. Endpoints come
        through as `ControllerName.methodName` because OneAgent's Java
        sensor pre-populates `endpoint.name` from `code.namespace` +
        `code.function` at capture time, bypassing the unified
        ruleset's `http.route` rule. See Rung 2.

        The real URL-normalization gap is frameworks that genuinely do
        not emit `http.route` - gateways, reverse proxies, and older
        servers. Look at today's SDv2 endpoint surface as background:
    - id: 00000000-0000-0000-0006-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields endpoint.name, cnt
            | sort cnt desc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0006-000000000004
      type: markdown
      markdown: |-
        **Result reading:** Endpoint names are class.method (for
        controller hits - OneAgent Java sensor origin) or `GET /*`
        (for `/actuator/health`-style traffic where no controller
        matched). For workloads behind Nginx/Kong/IIS where
        `http.route` is *actually* missing, today's fallback is
        `/*`-style - unusable. URL normalization fixes that case by
        deriving stable routes from URL paths: `/api/orders/12345/items/abc-def-ghi`
        collapses to `GET /api/orders` via four heuristics (digits,
        hex, mixed-case token, all-uppercase). Writes to `http.route`
        itself with a derived marker.

        Coverage: ~70-75% of paths get meaningful names. Existing URL
        pattern matching (SDv2) and request naming (SDv1) rules take
        priority; normalization is the default when they are absent.

        > **Direction:** another dimension value (`http.route`) stops
        > being a guess and becomes reliable. No new splits. The work
        > moves from entity detection into the dimension itself.

        ## 2. Messaging: consumer spans leave the endpoint surface

        Today `order-events process` appears in both endpoint-named
        queries (`dt.service.request.*`) and the messaging family
        (`dt.service.messaging.process.*`). That duplication mixes
        messaging data into HTTP response-time baselines.
    - id: 00000000-0000-0000-0006-000000000005
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
            by: { dt.entity.service, endpoint.name },
            from: now()-30m
            | lookup [fetch dt.entity.service | fields id, entity.name],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
                AND contains(endpoint.name, "process")
            | fields endpoint.name, cnt
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0006-000000000006
      type: markdown
      markdown: |-
        **Result reading:** `order-events process` shows up as an
        endpoint of the HTTP-style request family.

        Product direction: **stop detecting endpoints from consumer
        spans for SDv2** (new tenants first). Messaging metrics already
        live in their own family with richer dimensions, and the Phase
        3 UI surfaces them as a dedicated Message Processing tab rather
        than mixed with HTTP endpoints.

        Queries against `dt.service.messaging.process.*` (Rung 4)
        continue working unchanged. Only the endpoint-named messaging
        rows in `dt.service.request.*`-style queries go away.

        > **Direction:** one more axis that used to appear as an
        > endpoint name moves to its own dedicated metric family. Fewer
        > mixed concepts per dimension.

        ## 3. Identity: SERVICE_DEPLOYMENT separates deployment context

        Today the UNIFIED service name is `orders-sdv2 -- orders-demo` -
        the namespace is in the name. Deploy the same workload to
        `orders-sdv2-staging` and a second UNIFIED entity appears.
    - id: 00000000-0000-0000-0006-000000000007
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter serviceType == "UNIFIED"
            | fieldsAdd ns = serviceDetectionAttributes[`k8s.namespace.name`],
                        workload = serviceDetectionAttributes[`k8s.workload.name`]
            | filter contains(entity.name, "orders-demo")
            | fields entity.name, ns, workload, id
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0006-000000000008
      type: markdown
      markdown: |-
        **Result reading:** Exactly one UNIFIED entity today. Production
        preview behavior still splits by namespace. The namespace is in
        the name.

        Stated direction (PM-led, not shipped): remove
        `{k8s.namespace.name}` from the built-in naming rule; make the
        built-in namespace-splitting rule opt-in; introduce
        **`SERVICE_DEPLOYMENT`** as an additive entity carrying
        deployment context (namespace, cluster, release version, stage)
        and linking back to a single SERVICE entity.

        After that ships:

        - One `SERVICE` identity for `orders-demo` across all
          environments.
        - Multiple `SERVICE_DEPLOYMENT` entities per environment, each
          pointing at the same SERVICE.
        - Per-environment views as a split-by on dimensions of the one
          identity, not as separate entities.

        > **Direction:** the last axis SDv2 still splits into entities
        > (namespace) moves to a dimension. The "one identity" promise
        > of Rung 2 becomes literal across environments.

        ## Phase 3 context: classic service types collapse entirely

        The SDv1 idioms in Rungs 0, 1, 3, 4 depend on WEB_SERVICE,
        WEB_REQUEST_SERVICE, and MESSAGING_SERVICE being first-class in
        the UI. In Phase 3 (3rd gen Services app) those types are
        removed:

        | Classic type | Phase 3 home |
        |---|---|
        | Web Request Service | main service list |
        | Queue Listener | Message Processing tab on calling service |
        | Database | DB Queries tab on calling service |
        | External | Outbound Calls tab on calling service |
        | Key requests | Enhanced endpoints |

        The SDv1 *queries* continue to work as DQL against the same
        metric families. Only the UI navigation collapses.

        > **Consistent direction:** every classic SDv1 split that used
        > to own a dedicated entity (queue listeners, databases,
        > external services) moves to a dimension or a tab on the
        > calling service. The "multiple entities from one workload"
        > pattern exits the product surface.

        ## Parked

        - `@Scheduled` / `@Async` background Spring work under SDv2
        - `faas_invoke.*` family for Lambda triggers
        - Webhook endpoints for inbound third-party calls
        - `service.version` / `deployment.release_stage` dimensions
          once SERVICE_DEPLOYMENT lands
        - Custom services in SDv2 as spans on the parent service

        ## What you now know

        > The active direction for SDv2 is: every remaining axis that
        > currently produces a split - consumer-span endpoints, the
        > namespace in the name, the classic messaging/DB/external
        > service types - moves to a dimension or tab on a single
        > identity. The ladder's "attribute is the unit" is the frozen
        > form of an ongoing flattening.
