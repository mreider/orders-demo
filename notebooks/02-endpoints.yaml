name: "orders-demo / 02 - Endpoints are the unit of health"
type: notebook
content:
  defaultTimeframe:
    from: now()-2h
    to: now()
  sections:
    - id: 00000000-0000-0000-0002-000000000001
      type: markdown
      markdown: |-
        # Rung 2: Endpoints are the unit of health

        Recap: the SDv1 fragmentation collapsed into one UNIFIED service called
        `orders-sdv2 -- orders-demo`. The natural next question is: how do I
        measure individual endpoints when they no longer have their own service
        entities?

        ## The new idea

        > In SDv2, **endpoints** are the unit of per-feature health. Every endpoint
        > is detected and baselined automatically. No key-request nomination
        > required.
    - id: 00000000-0000-0000-0002-000000000002
      type: markdown
      markdown: |-
        ## Per-endpoint request metrics on the SDv2 side
    - id: 00000000-0000-0000-0002-000000000003
      type: dql
      state:
        input:
          value: |-
            timeseries {
              avg_rt  = avg(dt.service.request.response_time),
              p95_rt  = percentile(dt.service.request.response_time, 95),
              count   = sum(dt.service.request.count),
              failed  = sum(dt.service.request.failure_count)
            },
            by: { dt.entity.service, endpoint.name },
            from: now()-2h
            | lookup [fetch dt.entity.service | fields id, entity.name], sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields svc.entity.name, endpoint.name, avg_rt, p95_rt, count, failed
            | sort count desc
          timeframe:
            from: now()-2h
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0002-000000000004
      type: markdown
      markdown: |-
        Each HTTP endpoint is its own row. Each has its own response time,
        p95, throughput, and failure rate. **Nothing was configured** to
        produce this. No key requests. No splitting rules.

        ## Compare to the SDv1 side: same metrics, same workload
    - id: 00000000-0000-0000-0002-000000000005
      type: dql
      state:
        input:
          value: |-
            timeseries {
              avg_rt = avg(dt.service.request.response_time),
              count  = sum(dt.service.request.count)
            },
            by: { dt.entity.service, endpoint.name },
            from: now()-2h
            | lookup [fetch dt.entity.service | fields id, entity.name], sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter (contains(svc.entity.name, "orders-demo") OR contains(svc.entity.name, "OrderEventsListener")) AND svc.entity.name != "orders-sdv2 -- orders-demo"
            | fields svc.entity.name, endpoint.name, avg_rt, count
            | sort svc.entity.name asc, count desc
          timeframe:
            from: now()-2h
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0002-000000000006
      type: markdown
      markdown: |-
        Notice the `endpoint.name` on the SDv1 side. It is often
        `NON_KEY_REQUESTS` or similar rollup: without key-request nomination,
        the detail is hidden. That is the configuration burden Rung 1 removed.

        ## Response time over time, endpoint-split
    - id: 00000000-0000-0000-0002-000000000007
      type: dql
      state:
        input:
          value: |-
            timeseries avg_rt = avg(dt.service.request.response_time),
              by: { dt.entity.service, endpoint.name },
              from: now()-2h
            | lookup [fetch dt.entity.service | fields id, entity.name], sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter svc.entity.name == "orders-sdv2 -- orders-demo"
            | fields endpoint.name, avg_rt, timeframe, interval
          timeframe:
            from: now()-2h
            to: now()
        visualization: lineChart
    - id: 00000000-0000-0000-0002-000000000008
      type: markdown
      markdown: |-
        Each endpoint's response time as its own series. `/orders/search`
        should show the longest tail, `/inventory/check` the tightest.
        Both were baselined automatically.

        ## What you now know

        > Endpoints, not services, are the unit of per-feature health in SDv2.
        > Every endpoint gets a baseline automatically. Key-request
        > nomination is a thing of the SDv1 past.

        Next notebook: **03 - Kafka is a peer endpoint**
