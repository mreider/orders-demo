type: notebook
content:
  defaultTimeframe:
    from: now()-30m
    to: now()
  sections:
    - id: 00000000-0000-0000-0000-000000000001
      type: markdown
      markdown: |-
        # Anchor: SDv1 splitting vs SDv2 splitting

        Both namespaces (`orders-sdv1` and `orders-sdv2`) run the same Spring
        Boot app with two `@RestController`s and one `@KafkaListener`. The
        only difference between them is which detection model is active.

        This notebook walks the entity surface each model produces, and
        names exactly what they split on.

        ## How to read the rest of the ladder

        > **SDv1 splits workloads into multiple service entities.** The unit
        > of separation is the entity itself. Class-level boundaries
        > (controller, listener) and deployment boundaries (namespace,
        > host group) all become distinct entities.
        >
        > **SDv2 keeps one service entity per workload.** The unit of
        > separation is the metric dimension. Class-level boundaries become
        > values of the `endpoint.name` and `messaging.destination.name`
        > attributes on a single UNIFIED service.

        Every query in this ladder answers the same pair of questions:
        1. Where did SDv1 put the split? (which entity owns this data?)
        2. Where did SDv2 put the split? (which dimension value carries this data?)
    - id: 00000000-0000-0000-0000-000000000002
      type: markdown
      markdown: |-
        ## 1. How many SDv1 entities came from one JVM?
    - id: 00000000-0000-0000-0000-000000000003
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter contains(entity.name, "orders-demo") OR contains(entity.name, "OrderEventsListener")
            | filter serviceType != "UNIFIED"
            | fields entity.name, serviceType, id
            | sort serviceType asc, entity.name asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0000-000000000004
      type: markdown
      markdown: |-
        **Result reading:** SDv1 splits one JVM into multiple service
        entities. Expected rows:

        - `orders-demo` (WEB_REQUEST_SERVICE) - the raw request service
        - `orders-demo - OrderController` (WEB_SERVICE) - split from the raw
          request service by the `@Controller` class name
        - `orders-demo - InventoryController` (WEB_SERVICE) - same rule
        - `OrderEventsListener` (MESSAGING_SERVICE) - the `@KafkaListener`
          produces its own messaging entity

        Duplicated rows (two `OrderController`, two `InventoryController`,
        two `OrderEventsListener`) are because the same app runs in both
        `orders-sdv1` and `orders-sdv2` namespaces. SDv1 splits the service
        per-host-group/process-group, so each namespace's deployment has
        its own copy of every WEB_SERVICE / MESSAGING_SERVICE entity.

        > **SDv1 splits on**: class-level boundaries (controller, listener),
        > plus deployment-level boundaries (namespace / host group).

        **These are not four independent services.** They are four
        *faux entities* representing fragments of one Spring Boot JAR.
        One team owns the whole workload - not separate controllers.
        The splitting model comes from an era of J2EE monoliths that
        genuinely bundled many logically distinct services in one JVM
        (EJBs, MDBs, servlets from separate WARs). For a Spring Boot
        microservice, the splits fragment what is already one service.
        The remaining rungs of the ladder compare this faux-entity
        view against SDv2's one-identity view.
    - id: 00000000-0000-0000-0000-000000000005
      type: markdown
      markdown: |-
        ## 2. How many SDv2 entities came from the same JVM?
    - id: 00000000-0000-0000-0000-000000000006
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter serviceType == "UNIFIED"
            | filter contains(entity.name, "orders-demo")
            | fieldsAdd ns = serviceDetectionAttributes[`k8s.namespace.name`],
                        workload = serviceDetectionAttributes[`k8s.workload.name`],
                        cluster = serviceDetectionAttributes[`k8s.cluster.uid`]
            | fields entity.name, ns, workload, cluster, id
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0000-000000000007
      type: markdown
      markdown: |-
        **Result reading:** One row.

        SDv2 splits identity by (`k8s.cluster.uid`, `k8s.namespace.name`,
        `k8s.workload.name`) only. Controllers and Kafka listeners do NOT
        produce separate entities; they become dimensions of the single
        UNIFIED service.

        > **SDv2 splits on**: deployment-level boundaries only
        > (cluster / namespace / workload). Class-level boundaries are
        > delegated to `endpoint.name` and messaging dimensions - inside
        > the one identity.

        ## 3. Side-by-side counts
    - id: 00000000-0000-0000-0000-000000000008
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter contains(entity.name, "orders-demo") OR contains(entity.name, "OrderEventsListener")
            | fieldsAdd detection = if(serviceType == "UNIFIED", "SDv2", else: "SDv1")
            | summarize entity_count = count(), example_names = collectArray(entity.name),
                by: { detection, serviceType }
            | sort detection asc, serviceType asc
          timeframe:
            from: now()-30m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0000-000000000009
      type: markdown
      markdown: |-
        **Result reading:** From the same JVM, SDv1 produces 7+ entities
        (2 WEB_REQUEST_SERVICE, 4 WEB_SERVICE, 2 MESSAGING_SERVICE across
        both namespaces) while SDv2 produces 1. Everything SDv1 achieved
        by splitting lives in SDv2 as dimensions of that 1 entity.

        ## What you now know

        > SDv1 splits workloads into multiple entities. SDv2 keeps one
        > entity per workload and splits the same axes as dimensions.

        Next notebook: **01 - Optimally sliced SDv1 (entity is the unit)**.
