name: "orders-demo / 01 - One unified service identity"
type: notebook
content:
  defaultTimeframe:
    from: now()-2h
    to: now()
  sections:
    - id: 00000000-0000-0000-0001-000000000001
      type: markdown
      markdown: |-
        # Rung 1: One unified service identity

        Recap: in SDv1 the `orders-sdv1` namespace shows several service entities
        from one JVM (WEB_REQUEST_SERVICE, multiple WEB_SERVICE, MESSAGING_SERVICE).

        ## The new idea

        > In SDv2, those fragments **collapse into one UNIFIED service** per
        > (namespace, workload). Identity is derived from k8s resource attributes,
        > not from process-group fingerprint.
    - id: 00000000-0000-0000-0001-000000000002
      type: markdown
      markdown: |-
        ## Find the SDv2 UNIFIED service
    - id: 00000000-0000-0000-0001-000000000003
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter serviceType == "UNIFIED" AND contains(entity.name, "orders-demo")
            | fieldsAdd ns = serviceDetectionAttributes[`k8s.namespace.name`],
                        workload = serviceDetectionAttributes[`k8s.workload.name`],
                        cluster = serviceDetectionAttributes[`k8s.cluster.uid`]
            | fields entity.name, serviceType, ns, workload, cluster, entity.id
          timeframe:
            from: now()-2h
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0001-000000000004
      type: markdown
      markdown: |-
        One row. Name `orders-sdv2 -- orders-demo`. Type `UNIFIED`. The namespace,
        workload, and cluster uid are carried as detection attributes.

        ## See the built-in detection rule in action

        The service name comes from a rule shipped with the preview:
        `{k8s.namespace.name} -- {k8s.workload.name}`. The splitting rule
        `[Built-in] Split services by k8s cluster and namespace` is also on
        by default, so a second namespace produces a second UNIFIED entity.
        Both are visible in `matchedServiceDetectionV2Rules`.
    - id: 00000000-0000-0000-0001-000000000005
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter serviceType == "UNIFIED" AND contains(entity.name, "orders-demo")
            | fields entity.name, matchedServiceDetectionV2Rules
          timeframe:
            from: now()-2h
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0001-000000000006
      type: markdown
      markdown: |-
        ## Count what collapsed

        Before (orders-sdv1 namespace, SDv1 default): 4 or more entities for
        one JVM (WEB_REQUEST_SERVICE + per-controller WEB_SERVICE + MESSAGING_SERVICE).

        After (orders-sdv2 namespace, SDv2 enabled): 1 UNIFIED entity for the
        same JVM. Controllers and the Kafka listener are endpoints of this
        one service, not separate service entities.

        Side-by-side:
    - id: 00000000-0000-0000-0001-000000000007
      type: dql
      state:
        input:
          value: |-
            fetch dt.entity.service
            | filter contains(entity.name, "orders-demo") OR contains(entity.name, "OrderEventsListener")
            | fieldsAdd detection = if(serviceType == "UNIFIED", "SDv2", else: "SDv1")
            | summarize entities = count(), names = collectArray(entity.name), by: { detection, serviceType }
            | sort detection asc, serviceType asc
          timeframe:
            from: now()-2h
            to: now()
        visualization: table
    - id: 00000000-0000-0000-0001-000000000008
      type: markdown
      markdown: |-
        ## What you now know

        > Under SDv2, a Spring JVM deployed to a namespace is one UNIFIED
        > service. Controllers and Kafka listeners that used to be separate
        > services now fold in as endpoints. Identity is k8s-native and
        > stable across refactors.

        Next notebook: **02 - Endpoints are the unit of health**
