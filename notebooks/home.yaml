        # orders-demo: SDv1 vs SDv2 splitting ladder

        A walkable comparison of how **SDv1 splits a workload into
        multiple service entities** vs. how **SDv2 keeps one entity and
        splits the same axes as metric dimensions**. Same Spring Boot
        app, deployed to two Kubernetes namespaces, each under a
        different detection model. Live queries against the tenant.

        ## The one idea the ladder teaches

        > SDv1's unit of slicing is the **entity**. Controllers become
        > separate WEB_SERVICE entities, Kafka listeners become
        > MESSAGING_SERVICE entities, each namespace gets its own copy.
        > Health is measured per entity.
        >
        > SDv2's unit of slicing is the **attribute**. One UNIFIED
        > entity per workload. Controllers, listeners, and destinations
        > become values of `endpoint.name` and
        > `messaging.destination.name` on that single identity. Health
        > is measured per dimension.
        >
        > Everything else in the ladder is worked examples.

        ## Why the two models exist

        SDv1 was designed for an era when one JVM hosted many *logically
        distinct* services. Classic J2EE monoliths on WebSphere or
        WebLogic bundled EJB session beans, message-driven beans,
        servlets, and JAX-RS resources from multiple WARs under a
        single process - often owned by different teams shipping under
        a single EAR. Splitting by controller class, listener class,
        and host group surfaced those genuinely-distinct services as
        their own observable entities. That matched reality.

        For modern Spring Boot and microservice workloads, that shape
        doesn't fit. One runnable JAR, one team, one deployment unit:
        the JVM *is* the service. SDv1's splits inside a microservice
        produce **faux entities** - they look like independent services
        but are just parts of the same thing. Teams end up rebuilding
        dashboards to aggregate them back together, because that's how
        they conceptually relate.

        SDv2 aligns identity with the deployment unit (k8s workload,
        Lambda function, ECS task). Controllers, listeners, and
        endpoints inside a workload become dimensions of the one
        service - which matches how modern microservices are actually
        shipped and owned. The historical case for class-level
        entity-splitting still exists for true monoliths; it just
        isn't what most Spring Boot apps need today.

