      markdown: |-
        ## What is live on this tenant

        Both namespaces run the same Spring Boot app. The only
        difference is which detection model is active.

        - **`orders-sdv1` namespace** - SDv1 detection with
          **enhanced endpoints enabled**
          (`builtin:enhanced-endpoints-for-sdv1`, scope =
          `CLOUD_APPLICATION_NAMESPACE-A35DA102BB54BC76`).
        - **`orders-sdv2` namespace** - SDv2 enabled via
          `builtin:service-detection-v2-for-oneagent` (scope =
          `CLOUD_APPLICATION_NAMESPACE-A6537BAAF384A1F2`,
          `enableSDV2ForKubernetesWorkloads=true`).

        Load is generated by k6 in each namespace - 70/25/5 iter/s mix
        of `POST /orders/submit`, `GET /orders/search`,
        `GET /inventory/check`. The submit path seeds 2% bad messages
        to Kafka, which the `@KafkaListener` rejects - the bad-message
        trail is what Rung 5 observes.

        **The k6 Job runs for 30 minutes then completes.** If live
        data is stale, re-apply `k8s/40-load.yaml` in the repo.
    - id: 00000000-0000-0000-ffff-000000000004
      type: markdown
      markdown: |-
        ## Quick sanity check that the tenant has data

        Every rung depends on live metrics from the workload. If this
        query returns 0 rows, the loadgens have stopped - restart
        them before walking further.
    - id: 00000000-0000-0000-ffff-000000000005
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
              by: { dt.entity.service, endpoint.name },
              from: now()-5m
            | lookup [fetch dt.entity.service | fields id, entity.name, serviceType],
                sourceField: dt.entity.service, lookupField: id, prefix: "svc."
            | filter contains(svc.entity.name, "orders-demo") OR contains(svc.entity.name, "OrderEvents")
            | fieldsAdd detection = if(svc.serviceType == "UNIFIED", "SDv2", else: "SDv1")
            | summarize endpoints = countDistinct(endpoint.name), total = sum(arraySum(cnt)),
                by: { detection, svc.entity.name, svc.serviceType }
            | sort detection asc, svc.entity.name asc
          timeframe:
            from: now()-5m
            to: now()
        visualization: table
    - id: 00000000-0000-0000-ffff-000000000006
      type: markdown
      markdown: |-
        **Result reading:**

        - Expected: rows for both `orders-sdv1` side entities (WEB_SERVICE,
          MESSAGING_SERVICE, WEB_REQUEST_SERVICE) and the single
          `orders-sdv2 -- orders-demo` UNIFIED entity.
        - If `total` is 0 or NULL anywhere, loadgens have stopped - see
          the k6 Job section above.
        - This one query already previews the pedagogy: SDv1 produces
          several rows (the splits), SDv2 produces one row (the lack of
          split).

