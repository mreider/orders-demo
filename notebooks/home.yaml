    - id: 00000000-0000-0000-ffff-000000000006
      type: markdown
      markdown: |-
        ## Tenant check: is the demo workload running?

        Several labs reference the companion `orders-demo` application
        when a learner's tenant doesn't have the right shape. This
        query confirms whether the demo is currently deployed in this
        tenant and producing traffic.

    - id: 00000000-0000-0000-ffff-000000000007
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
              by: {k8s.namespace.name, k8s.workload.name},
              filter: matchesValue(k8s.workload.name, "orders-demo")
                   OR matchesValue(k8s.workload.name, "orders-demo-named"),
              from: now()-5m
            | sort k8s.namespace.name asc, k8s.workload.name asc
          timeframe:
            from: now()-5m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-ffff-000000000008
      type: markdown
      markdown: |-
        **Result reading:**

        - Expected when demo is live:
          - `orders-sdv1` + `orders-demo` (baseline Classic workload)
          - `orders-sdv1` + `orders-demo-named` (with `OTEL_SERVICE_NAME=orders-api`)
          - `orders-sdv2` + `orders-demo` (Latest detection)
        - Zero rows -> demo loadgens have stopped. Re-apply the k6 Jobs:
          `kubectl apply -f k8s/40-load.yaml k8s/41-load-named.yaml` in
          the [orders-demo repo](https://github.com/mreider/orders-demo).

