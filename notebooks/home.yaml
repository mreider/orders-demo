    - id: 00000000-0000-0000-ffff-000000000001
      type: markdown
      markdown: |-
        # SDv2 presentation: home

        A migration presentation for Dynatrace customers moving from Service
        Detection v1 to Service Detection v2 on OneAgent-monitored
        workloads. Each section pairs a short narrative (on GitHub) with
        an executable demo notebook (in this tenant). Open the notebooks
        in order to follow the talk track, or pick one to answer a
        specific question.

        > **The shift in one sentence:**
        > SDv2 collapses the `dt.service.name` fragmentation that SDv1
        > produces per controller class and listener. One workload now
        > produces one `dt.service.name`, and per-endpoint granularity
        > lives on first-class metric dimensions.

        ## Before you start

        Skim [Follow along in your own tenant](https://github.com/mreider/orders-demo/blob/main/presentation/00-setup.md)
        for the 3-minute setup. One `dtctl apply` loop and you're ready.

    - id: 00000000-0000-0000-ffff-000000000002
      type: markdown
      markdown: |-
