    - id: 00000000-0000-0000-ffff-000000000006
      type: markdown
      markdown: |-
        ## Tenant check: is the companion demo workload running?

        Several sections optionally use the `orders-demo` Spring Boot
        app when your tenant doesn't have a workload with the right
        shape. This query confirms whether it's deployed here and
        producing traffic.

    - id: 00000000-0000-0000-ffff-000000000007
      type: dql
      state:
        input:
          value: |-
            timeseries cnt = sum(dt.service.request.count),
              by: {k8s.namespace.name, k8s.workload.name},
              filter: matchesValue(k8s.workload.name, "orders-demo")
                   OR matchesValue(k8s.workload.name, "orders-demo-named"),
              from: now()-5m
            | sort k8s.namespace.name asc, k8s.workload.name asc
          timeframe:
            from: now()-5m
            to: now()
        visualization: table

    - id: 00000000-0000-0000-ffff-000000000008
      type: markdown
      markdown: |-
        **How to read this:**

        - Expected when the demo is live:
          - `orders-sdv1` + `orders-demo` (baseline Classic workload)
          - `orders-sdv1` + `orders-demo-named` (with `OTEL_SERVICE_NAME=orders-api`)
          - `orders-sdv2` + `orders-demo` (Latest detection)
        - Zero rows means the loadgens stopped. Re-apply them with
          `kubectl apply -f k8s/40-load.yaml k8s/41-load-named.yaml` from the
          [orders-demo repo](https://github.com/mreider/orders-demo).

