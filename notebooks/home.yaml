        # Services in Latest Dynatrace - Curriculum Home

        A hands-on course for existing Dynatrace customers on how the
        Latest Services app models services, where its design differs
        from Classic, and what to do today for features still in flight.

        Every module pairs a short concept narrative (GitHub markdown)
        with an executable lab notebook (in this tenant). The course
        takes ~4 hours end-to-end; each module is a self-contained 15-20
        minute unit. Run them in order.

        > **The single idea the curriculum teaches:**
        > Latest Dynatrace moved the unit of slicing from **entity** to
        > **attribute**. One workload = one service entity, with
        > dimensions that carry what used to require multiple entities
        > to represent. Every module below is a worked consequence of
        > that one shift.

        ## Before you start

        Read [Module 0 - Lab setup](https://github.com/mreider/orders-demo/blob/main/curriculum/unit-1-what-is-a-service/module-0-lab-setup.md)
        to ensure your tenant is loaded with the companion notebooks.
        One-time `dtctl apply` loop covers it.

