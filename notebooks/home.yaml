        | **02** | [Three transport families](https://github.com/mreider/orders-demo/blob/main/presentation/02-three-transport-families.md) | `SDv2 demo / 02 Three transport families` |
        | **03** | [Dimensions, not entities](https://github.com/mreider/orders-demo/blob/main/presentation/03-dimensions-not-entities.md) | `SDv2 demo / 03 Dimensions, not entities` |
        | **04** | [SDv1 vs SDv2, side by side](https://github.com/mreider/orders-demo/blob/main/presentation/04-sdv1-vs-sdv2.md) | `SDv2 demo / 04 SDv1 vs SDv2, side by side` |

