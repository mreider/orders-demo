# Redpanda: single-node Kafka-compatible broker, one instance per namespace.
# Dev/demo config only - production Redpanda would use the operator or Helm chart.
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: orders-sdv1
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: orders-sdv1
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.9
          args:
            - redpanda
            - start
            - --overprovisioned
            - --smp=1
            - --memory=512M
            - --reserve-memory=0M
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda.orders-sdv1.svc.cluster.local:9092
          ports:
            - containerPort: 9092
            - containerPort: 9644
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
