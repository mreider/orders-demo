# k6 load generator: identical Job in each namespace.
#
# The loadtest-script ConfigMap is NOT declared here on purpose - it is
# created at apply-time from load/loadtest.js by scripts/up.sh and by the
# deploy workflow (so the script lives in one place: load/loadtest.js).
apiVersion: batch/v1
kind: Job
metadata:
  name: loadgen
  namespace: orders-sdv1
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          args: ["run", "/scripts/loadtest.js"]
          env:
            - name: BASE_URL
              value: http://orders-demo:8080
            - name: DURATION
              value: "30m"
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: script
          configMap:
            name: loadtest-script
---
