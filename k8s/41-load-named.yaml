# Load generator for the orders-demo-named workload in orders-sdv1. Reuses the
# same loadtest-script ConfigMap as 40-load.yaml - only the BASE_URL differs.
# Runs k6 in a shell loop so traffic never stops.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen-named
  namespace: orders-sdv1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen-named
  template:
    metadata:
      labels:
        app: loadgen-named
    spec:
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          command: ["/bin/sh", "-c"]
          args:
            - "while true; do k6 run /scripts/loadtest.js; sleep 1; done"
          env:
            - name: BASE_URL
              value: http://orders-demo-named:8080
            - name: DURATION
              value: "30m"
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: script
          configMap:
            name: loadtest-script
