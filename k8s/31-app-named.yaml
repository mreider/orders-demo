# Second workload in the orders-sdv1 namespace, identical image + config
# to orders-demo, but with OTEL_SERVICE_NAME set. This powers the
# `service.name` prefix demo in section 1 of the presentation: two
# otherwise-identical workloads side-by-side, one with a resource
# attribute that participates in the naming chain and one without.
#
# The detection-layer prefix fix (shipped 2026-Q1) prefixes every SDv1
# `dt.service.name` fragment with the configured service.name, producing
# values like `orders-api (orders-demo - OrderController)` on metrics
# and spans. `entity.name` in the Services app does not yet carry the
# prefix — list-view UI update is still pending.
#
# Both OTEL_SERVICE_NAME and OTEL_RESOURCE_ATTRIBUTES are set so OneAgent
# and the OTel autoinstrumentation that ships with it both pick them up.
apiVersion: v1
kind: Service
metadata:
  name: orders-demo-named
  namespace: orders-sdv1
spec:
  selector:
    app: orders-demo-named
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-demo-named
  namespace: orders-sdv1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-demo-named
  template:
    metadata:
      labels:
        app: orders-demo-named
    spec:
      containers:
        - name: orders-demo-named
          image: ${ORDERS_IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: "orders-api"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=orders-api,service.namespace=orders"
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/orders
            - name: DB_USER
              value: orders
            - name: DB_PASSWORD
              value: orders
            - name: KAFKA_BOOTSTRAP
              value: redpanda:9092
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx512m"
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
